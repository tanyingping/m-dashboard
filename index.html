<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M馆城市问题诊断看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--card:#fff;--primary:#1a73e8;--primary-light:#e8f0fe;
  --danger:#ea4335;--danger-light:#fce8e6;--warning:#f9ab00;--warning-light:#fef7e0;
  --success:#34a853;--success-light:#e6f4ea;--text:#202124;--text2:#5f6368;
  --border:#e0e0e0;--sidebar-w:280px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.topbar{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar h1{font-size:20px;font-weight:600;letter-spacing:1px}
.topbar .meta{font-size:13px;opacity:.85}
.topbar .meta span{margin-left:16px}
.layout{min-height:calc(100vh - 70px)}
.main{flex:1;padding:20px;overflow-x:hidden}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;line-height:18px;white-space:nowrap}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-warning{background:var(--warning-light);color:#e37400}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-info{background:var(--primary-light);color:var(--primary)}
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-btn{padding:10px 24px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:var(--primary)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:2400px}
.data-table thead{background:#1a237e;color:#fff;position:sticky;top:0;z-index:3}
.data-table thead tr:first-child th{position:sticky;top:0;z-index:5}
.data-table thead tr:nth-child(2) th{position:sticky;top:32px;z-index:5}
.data-table .avg-row td{position:sticky;top:64px;z-index:4;background:#e3f2fd;font-weight:600}
.data-table th.labels-col,.data-table td.labels-col{position:sticky;left:70px;z-index:2;background:#fff;min-width:180px}
.data-table thead th.labels-col{z-index:5}
.data-table .avg-row td.labels-col{z-index:4;background:#e3f2fd}
.data-table th.cat-header{padding:6px 6px;font-size:12px;letter-spacing:1px;font-weight:700;text-transform:uppercase}
.data-table th{padding:10px 6px;text-align:center;font-weight:600;white-space:nowrap;font-size:12px;cursor:pointer;user-select:none;position:relative;transition:background .15s}
.data-table th:hover{background:#283593}
.data-table th:first-child,.data-table td:first-child{position:sticky;left:0;z-index:2;min-width:70px}
.data-table th:first-child{z-index:4}
.data-table td:first-child{background:#fff}
.data-table tbody tr:hover td:first-child{background:#f5f7ff}
.data-table tbody tr.selected td:first-child{background:var(--primary-light)}
.data-table .avg-row td:first-child{background:#e3f2fd}
.data-table th:first-child::after,.data-table td:first-child::after{content:'';position:absolute;top:0;right:-6px;bottom:0;width:6px;pointer-events:none;background:linear-gradient(to right,rgba(0,0,0,.08),transparent)}
.data-table th.no-sort{cursor:default}
.data-table th.no-sort:hover{background:#1a237e}
.data-table th .sort-icon{font-size:10px;margin-left:2px;opacity:.5}
.data-table th .sort-icon.asc{opacity:1}
.data-table th .sort-icon.desc{opacity:1}
.data-table td{padding:7px 6px;text-align:center;border-bottom:1px solid #f0f0f0}
.data-table tbody tr{cursor:pointer;transition:background .15s}
.data-table tbody tr:hover{background:#f5f7ff}
.data-table tbody tr.selected{background:var(--primary-light)}
.data-table .city-col{text-align:left;font-weight:600;white-space:nowrap;min-width:70px}
.data-table .avg-row{background:#e3f2fd;font-weight:600;cursor:default}
.data-table .avg-row:hover{background:#e3f2fd}
.cell-good{color:var(--success);font-weight:600}
.cell-bad{color:var(--danger);font-weight:700}
.cell-warn{color:#e37400;font-weight:600}
.label-cell{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-start}
.text-col{text-align:left!important;min-width:160px;max-width:260px;font-size:12px;line-height:1.5;vertical-align:top}
.issue-line{display:flex;align-items:flex-start;gap:4px;padding:2px 0;color:var(--text)}
.issue-dot{flex-shrink:0;width:5px;height:5px;border-radius:50%;background:var(--danger);margin-top:6px}
.suggest-line{display:flex;align-items:flex-start;gap:4px;padding:2px 0;color:var(--primary)}
.suggest-arrow{flex-shrink:0;font-size:12px;margin-top:1px}
.no-issue{color:var(--border)}
.detail{display:none}
.detail.show{display:block}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.detail-header h2{font-size:22px;font-weight:700}
.detail-header .store-count{font-size:13px;color:var(--text2)}
.detail-labels{display:flex;gap:6px;flex-wrap:wrap}
.detail-labels .badge{font-size:12px;padding:3px 10px;line-height:22px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.metric-card.good::before{background:var(--success)}
.metric-card.bad::before{background:var(--danger)}
.metric-card.warn::before{background:var(--warning)}
.metric-card.neutral::before{background:var(--border)}
.metric-card .mc-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-card .mc-value{font-size:24px;font-weight:700}
.metric-card .mc-sub{font-size:11px;color:var(--text2);margin-top:2px}
.metric-card .mc-bench{font-size:11px;margin-top:4px}
.mc-bench.above{color:var(--success)}
.mc-bench.below{color:var(--danger)}
.section{background:var(--card);border-radius:10px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.section h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section h3 .icon{font-size:18px}
.issue-item{padding:8px 0;border-bottom:1px solid #f5f5f5;display:flex;gap:8px;align-items:flex-start}
.issue-item:last-child{border-bottom:none}
.issue-icon{flex-shrink:0;width:20px;text-align:center;margin-top:2px}
.issue-text{font-size:13px;line-height:1.5}
.issue-text.suggest{color:var(--primary)}
.issue-text.problem{color:var(--text)}
.store-chips{display:flex;flex-wrap:wrap;gap:6px}
.store-chip{background:#f0f2f5;padding:4px 10px;border-radius:6px;font-size:12px;color:var(--text2)}
.funnel{display:flex;align-items:center;gap:0;margin:12px 0;flex-wrap:wrap}
.funnel-step{text-align:center;padding:8px 16px;background:var(--primary-light);border-radius:8px;min-width:90px}
.funnel-step .fs-label{font-size:11px;color:var(--text2)}
.funnel-step .fs-value{font-size:18px;font-weight:700;color:var(--primary)}
.funnel-arrow{font-size:20px;color:var(--border);margin:0 4px;flex-shrink:0}
.compare-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.compare-bar .cb-label{width:90px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.compare-bar .cb-track{flex:1;height:20px;background:#f0f2f5;border-radius:4px;position:relative;overflow:hidden;max-width:300px}
.compare-bar .cb-fill{height:100%;border-radius:4px;transition:width .5s}
.compare-bar .cb-val{font-size:12px;font-weight:600;width:50px;flex-shrink:0}
.compare-bar .cb-avg{position:absolute;top:0;height:100%;width:2px;background:var(--danger);z-index:1}
@media(max-width:900px){
  .sidebar{display:none}
  .layout{flex-direction:column}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.lock-overlay{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1a237e,#1565c0);display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.lock-overlay.unlocked{opacity:0;pointer-events:none}
.lock-box{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:360px;width:90%}
.lock-box h2{font-size:18px;color:#1a237e;margin-bottom:6px}
.lock-box p{font-size:13px;color:#5f6368;margin-bottom:20px}
.lock-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;text-align:center;outline:none;transition:border .2s;letter-spacing:2px}
.lock-input:focus{border-color:#1a73e8}
.lock-btn{margin-top:16px;width:100%;padding:12px;border:none;border-radius:10px;background:#1a73e8;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.lock-btn:hover{background:#1557b0}
.lock-error{color:#ea4335;font-size:12px;margin-top:10px;min-height:18px}
#app{display:none}
#app.show{display:block}
</style>
</head>
<body>

<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <h2>M馆城市问题诊断看板</h2>
    <p>请输入访问密码</p>
    <input type="password" class="lock-input" id="lockInput" placeholder="密码" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="lock-btn" onclick="checkPwd()">进入看板</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>
<div id="app">
<div class="topbar">
  <h1>M馆城市问题诊断看板</h1>
  <div class="meta"><span id="dateDisplay"></span><span id="storeDisplay"></span></div>
</div>
<div style="background:var(--card);padding:10px 24px;display:flex;gap:16px;align-items:center;border-bottom:1px solid var(--border)">
  <label style="font-size:13px;color:#5f6368;font-weight:600">FM门店类型：</label>
  <select id="globalFilterType" onchange="onGlobalFilter()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:140px">
    <option value="all">全部</option>
    <option value="FM私教馆" selected>FM私教馆</option>
    <option value="FM包月馆">FM包月馆</option>
    <option value="FM黑金馆">FM黑金馆</option>
  </select>
  <label style="font-size:13px;color:#5f6368;font-weight:600;margin-left:12px">营业状态：</label>
  <select id="globalFilterStatus" onchange="onGlobalFilter()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px">
    <option value="all">全部</option>
    <option value="营业中" selected>营业中</option>
    <option value="待营业">待营业</option>
    <option value="暂停营业">暂停营业</option>
    <option value="停止营业">停止营业</option>
  </select>
</div>
<div class="layout">
  <div class="main">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">全国对比</button>
      <button class="tab-btn" data-tab="manager" onclick="switchTab('manager')">区经对比</button>
      <button class="tab-btn" data-tab="stores" onclick="switchTab('stores')">门店明细</button>
      <button class="tab-btn" data-tab="detail" onclick="switchTab('detail')">城市明细</button>
    </div>
    <div id="overviewPanel" class="fade-in"></div>
    <div id="managerPanel" class="detail"></div>
    <div id="storesPanel" class="detail">
      <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        <label style="font-size:13px;color:#5f6368">城市：</label>
        <select id="storeFilterCity" onchange="renderStores()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>
        <label style="font-size:13px;color:#5f6368;margin-left:8px">区经：</label>
        <select id="storeFilterMgr" onchange="renderStores()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>
        <label style="font-size:13px;color:#5f6368;margin-left:8px">标签：</label>
        <select id="storeFilterLabel" onchange="renderStores()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>
      </div>
      <div id="storeTableArea"></div>
    </div>
    <div id="detailPanel" class="detail"></div>
  </div>
</div>

// Diagnosis function
function diagnose(c) {
  const labels = [];
  if (c.dc < 10 && c.dl < 12 && c.dr < 0 && c.drf > 30) labels.push('综合偏低');
  if (c.drf > 40) labels.push('退款异常');
  else if (c.drf > 30) labels.push('退款偏高');
  if (c.dl < 10) labels.push('拉新瓶颈');
  else if (c.dl < 15) labels.push('拉新偏弱');
  if (c.dr < -5) labels.push('复购乏力');
  if (c.dcv < 30 && c.dat > 40) labels.push('体验课转化弱');
  if (c.dat < 35) labels.push('体验课到课低');
  const avgExp = c.eo / (c.sc || 1);
  if (avgExp < 12) labels.push('体验课量偏低');
  if (c.dlp > 0 && c.dlp < 3000) labels.push('拉新客单价偏低');
  if (c.drp != null && c.drp < 4000) labels.push('复购客单价偏低');
  if (c.cr > 1.5) labels.push('人力成本偏高');
  if (labels.length === 0) {
    if (c.dc >= 15 && c.dl >= 18) labels.push('表现良好');
    else labels.push('需持续关注');
  }
  return labels;
}

// Aggregate stores by dimension
function aggregate(stores, keyField, keyLabel) {
  const groups = {};
  stores.forEach(s => {
    const k = s[keyField];
    if (!groups[k]) groups[k] = {
      stores: [], sc: 0,
      pt:0,ns:0,lt:0,ln:0,rt:0,rn:0,rf:0,
      lu:0,lg:0,ru:0,rg:0,
      e30:0,r30:0,e60:0,r60:0,
      eo:0,ed:0,ea:0,ec:0,fu:0,
      cr_sum:0,cr_cnt:0,br_sum:0,br_cnt:0
    };
    const g = groups[k];
    g.stores.push(s.s);
    g.sc++;
    g.pt+=s.pt; g.ns+=s.ns; g.lt+=s.lt; g.ln+=s.ln;
    g.rt+=s.rt; g.rn+=s.rn; g.rf+=s.rf;
    g.lu+=s.lu; g.lg+=s.lg; g.ru+=s.ru; g.rg+=s.rg;
    g.e30+=s.e30; g.r30+=s.r30; g.e60+=s.e60; g.r60+=s.r60;
    g.eo+=s.eo; g.ed+=s.ed; g.ea+=s.ea; g.ec+=s.ec; g.fu+=s.fu;
    if (s.cr > 0) { g.cr_sum += s.cr; g.cr_cnt++; }
    if (s.br > 0) { g.br_sum += s.br; g.br_cnt++; }
  });
  
  const result = [];
  for (const [k, g] of Object.entries(groups)) {
    const n = g.sc;
    const c = {
      [keyLabel]: k,
      store_count: n,
      stores: g.stores,
      // Raw sums
      '业绩目标': g.pt, '净销售额': g.ns, '拉新目标': g.lt, '拉新净销售额': g.ln,
      '复购目标': g.rt, '复购净销售额': g.rn, '退款GMV': g.rf,
      '拉新用户数': g.lu, '私教拉新GMV': g.lg,
      '私教复购支付用户数': Math.round(g.ru), '私教复购GMV': g.rg,
      '到期用户数': Math.round(g.e30), '已复购数': Math.round(g.r30),
      '体验课订单数': g.eo,
      '包月正式用户数': Math.round(g.fu),
      '人力成本占比': g.cr_cnt ? Math.round(g.cr_sum/g.cr_cnt) : 0,
      '教练比': g.br_cnt ? Math.round(g.br_sum/g.br_cnt*10)/10 : 0,
      // Derived
      '业绩完成率': g.pt ? Math.round(g.ns/g.pt*1000)/10 : 0,
      '拉新完成率': g.lt ? Math.round(g.ln/g.lt*1000)/10 : 0,
      '复购完成率': g.rt ? Math.round(g.rn/g.rt*1000)/10 : 0,
      '复购目标占比': g.pt ? Math.round(g.rt/g.pt*1000)/10 : 0,
      '退款率': (g.rf+g.ns) ? Math.round(g.rf/(g.rf+g.ns)*1000)/10 : 0,
      '复购率': g.e30 ? Math.round(g.r30/g.e30*1000)/10 : 0,
      '店均拉新': Math.round(g.lu/n*10)/10,
      '店均净收入': Math.round(g.ns/n),
      '复购店均净收入': Math.round(g.rn/n),
      '拉新店均净收入': Math.round(g.ln/n),
      '拉新客单价': g.lu ? Math.round(g.lg/g.lu) : 0,
      '复购客单价': g.ru ? Math.round(g.rg/g.ru) : null,
      '店均体验课': Math.round(g.eo/n*10)/10,
      '派单率': g.eo ? Math.round(g.ed/g.eo*1000)/10 : 0,
      '上课率': g.eo ? Math.round(g.ea/g.eo*1000)/10 : 0,
      '体验课下单转化率': g.ea ? Math.round(g.ec/g.ea*1000)/10 : 0,
      '消课转化率': g.ea ? Math.round(g.ec/g.ea*1000)/10 : 0,
      '体验课转化率': g.ea ? Math.round(g.ec/g.ea*1000)/10 : 0,
      // Inventory (computed per-group)
      '盘点率_30':0,'盘点金额_30':0,'预估复购率_30':0,'咬合度_30':0,
      '盘点率_90':0,'盘点金额_90':0,'预估复购率_90':0,'咬合度_90':0,
    };
    
    // Compute inventory from member stores
    let it30=0,if30=0,iy30=0,ia30=0,it90=0,if90=0,iy90=0,ia90=0;
    g.stores.forEach(sname => {
      const inv = INV[sname];
      if (!inv) return;
      // Re-count from inv data: we need raw totals, but we stored rates
      // Actually, INV stores pre-computed rates. For group aggregation, we need raw sums.
      // We stored: [pd30, pa30, pr30, _, pd90, pa90, pr90, raw_a30, raw_a90]
      ia30 += inv[7]; // raw amount 30
      ia90 += inv[8]; // raw amount 90
      // For rates we need to re-derive from store-level raw data
      // But we don't have raw totals/filled/yes counts in INV...
      // Let's use weighted approach: sum amounts, then compute bite from target
    });
    c['盘点金额_30'] = Math.round(ia30);
    c['盘点金额_90'] = Math.round(ia90);
    // For rates, we use weighted average based on store counts with inv data
    let wt30=0,wf30=0,wy30=0,wt90=0,wf90=0,wy90=0;
    g.stores.forEach(sname => {
      const inv = INV[sname];
      if (!inv) return;
      // Approximate: if rate > 0, assume ~equal weight per store
      // This is a simplification; for exact aggregation we'd need raw counts
      wt30 += 1; wf30 += inv[0]; wy30 += inv[2];
      wt90 += 1; wf90 += inv[4]; wy90 += inv[6];
    });
    if (wt30 > 0) {
      c['盘点率_30'] = Math.round(wf30/wt30*10)/10;
      c['预估复购率_30'] = Math.round(wy30/wt30*10)/10;
    }
    if (wt90 > 0) {
      c['盘点率_90'] = Math.round(wf90/wt90*10)/10;
      c['预估复购率_90'] = Math.round(wy90/wt90*10)/10;
    }
    if (c['复购目标'] > 0) {
      c['咬合度_30'] = Math.round(c['盘点金额_30']/c['复购目标']*1000)/10;
      c['咬合度_90'] = Math.round(c['盘点金额_90']/c['复购目标']*1000)/10;
    }
    
    // Diagnosis
    c.labels = diagnose(c);
    c.label_count = c.labels.length;
    
    result.push(c);
  }
  return result.sort((a,b) => b.store_count - a.store_count);
}

function getNatData(stores) {
  const all = aggregate(stores, 't', '_dummy');
  // Create a single national entry
  const g = {
    stores: stores.map(s=>s.s), sc: stores.length,
    pt:0,ns:0,lt:0,ln:0,rt:0,rn:0,rf:0,
    lu:0,lg:0,ru:0,rg:0,e30:0,r30:0,e60:0,r60:0,
    eo:0,ed:0,ea:0,ec:0,fu:0,cr_sum:0,cr_cnt:0,br_sum:0,br_cnt:0
  };
  stores.forEach(s => {
    g.pt+=s.pt;g.ns+=s.ns;g.lt+=s.lt;g.ln+=s.ln;g.rt+=s.rt;g.rn+=s.rn;g.rf+=s.rf;
    g.lu+=s.lu;g.lg+=s.lg;g.ru+=s.ru;g.rg+=s.rg;
    g.e30+=s.e30;g.r30+=s.r30;g.e60+=s.e60;g.r60+=s.r60;
    g.eo+=s.eo;g.ed+=s.ed;g.ea+=s.ea;g.ec+=s.ec;g.fu+=s.fu;
    if(s.cr>0){g.cr_sum+=s.cr;g.cr_cnt++;}
    if(s.br>0){g.br_sum+=s.br;g.br_cnt++;}
  });
  const n = g.sc || 1;
  let ia30=0,ia90=0;
  g.stores.forEach(sn=>{const inv=INV[sn];if(inv){ia30+=inv[7];ia90+=inv[8];}});
  let wt30=0,wf30=0,wy30=0,wt90=0,wf90=0,wy90=0;
  g.stores.forEach(sn=>{const inv=INV[sn];if(!inv)return;
    wt30+=1;wf30+=inv[0];wy30+=inv[2];wt90+=1;wf90+=inv[4];wy90+=inv[6];
  });
  const nat = {
    store_count: stores.length,
    '业绩完成率': g.pt?Math.round(g.ns/g.pt*1000)/10:0,
    '拉新完成率': g.lt?Math.round(g.ln/g.lt*1000)/10:0,
    '复购完成率': g.rt?Math.round(g.rn/g.rt*1000)/10:0,
    '复购目标占比': g.pt?Math.round(g.rt/g.pt*1000)/10:0,
    '退款率': (g.rf+g.ns)?Math.round(g.rf/(g.rf+g.ns)*1000)/10:0,
    '复购率': g.e30?Math.round(g.r30/g.e30*1000)/10:0,
    '店均拉新': Math.round(g.lu/n*10)/10,
    '店均净收入': Math.round(g.ns/n),
    '复购店均净收入': Math.round(g.rn/n),
    '拉新店均净收入': Math.round(g.ln/n),
    '拉新客单价': g.lu?Math.round(g.lg/g.lu):0,
    '复购客单价': g.ru?Math.round(g.rg/g.ru):null,
    '上课率': g.eo?Math.round(g.ea/g.eo*1000)/10:0,
    '体验课下单转化率': g.ea?Math.round(g.ec/g.ea*1000)/10:0,
    '消课转化率': g.ea?Math.round(g.ec/g.ea*1000)/10:0,
    '体验课转化率': g.ea?Math.round(g.ec/g.ea*1000)/10:0,
    '人力成本占比': g.cr_cnt?Math.round(g.cr_sum/g.cr_cnt):0,
    '教练比': g.br_cnt?Math.round(g.br_sum/g.br_cnt*10)/10:0,
    '盘点金额_30': Math.round(ia30),
    '盘点金额_90': Math.round(ia90),
    '盘点率_30': wt30?Math.round(wf30/wt30*10)/10:0,
    '预估复购率_30': wt30?Math.round(wy30/wt30*10)/10:0,
    '盘点率_90': wt90?Math.round(wf90/wt90*10)/10:0,
    '预估复购率_90': wt90?Math.round(wy90/wt90*10)/10:0,
    '咬合度_30': g.rt?Math.round(ia30/g.rt*1000)/10:0,
    '咬合度_90': g.rt?Math.round(ia90/g.rt*1000)/10:0,
    '业绩目标':g.pt,'净销售额':g.ns,'复购目标':g.rt,
    '到期用户数':Math.round(g.e30),'已复购数':Math.round(g.r30),
    '体验课订单数':g.eo,'包月正式用户数':Math.round(g.fu),
    '拉新用户数':g.lu,
  };
  return nat;
}

function buildTable(items, cols, categories, sk, sd, toggleFn, totalStores, nat) {
  function sortIcon(key,sortable){
    if(sortable===false)return'';
    if(sk===key)return sd==='asc'?'<span class="sort-icon asc">▲</span>':'<span class="sort-icon desc">▼</span>';
    return'<span class="sort-icon">⇅</span>';
  }
  let sorted=[...items];
  if(sk){
    sorted.sort((a,b)=>{
      let va=a[sk],vb=b[sk];
      if(typeof va==='string')return sd==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      if(va==null)va=-Infinity; if(vb==null)vb=-Infinity;
      return sd==='asc'?(va-vb):(vb-va);
    });
  }
  let html='<div class="table-wrap"><table class="data-table"><thead><tr>';
  categories.forEach(cat=>{
    if(cat.label){
      html+='<th colspan="'+cat.span+'" class="cat-header" style="background:'+cat.color+';border-bottom:1px solid rgba(255,255,255,.2);font-size:13px;letter-spacing:1px;text-align:center">'+cat.label+'</th>';
    }else{
      html+='<th colspan="'+cat.span+'" class="no-sort" style="background:#1a237e"></th>';
    }
  });
  html+='</tr><tr>';
  cols.forEach(col=>{
    const icon=sortIcon(col.key,col.sortable);
    const cls=col.key==='labels'?' class="labels-col no-sort"':(col.sortable===false?' class="no-sort"':'');
    const onclick=col.sortable!==false&&col.key!=='labels'?' onclick="'+toggleFn+"('"+col.key+"')":'';
    html+='<th'+cls+onclick+'>'+col.label+icon+'</th>';
  });
  // National average row in thead
  html+='</tr><tr class="avg-row">';
  cols.forEach(col=>{
    if(['labels','cities','store','manager','city'].includes(col.key)){
      const cls=col.key==='labels'?' class="labels-col"':'';
      html+='<td'+cls+'></td>';return;
    }
    if(col.key==='store_count'){html+='<td>'+totalStores+'</td>';return;}
    if(col.key==='复购客单价'){html+='<td>'+(nat['复购客单价']!=null?'¥'+nat['复购客单价']:'-')+'</td>';return;}
    if(col.key==='盘点金额_30'){html+='<td>'+(nat['盘点金额_30']/10000).toFixed(1)+'万</td>';return;}
    if(col.key==='盘点金额_90'){html+='<td>'+(nat['盘点金额_90']/10000).toFixed(1)+'万</td>';return;}
    if(col.key==='店均体验课'){const to=items.reduce((s,c)=>s+(c['体验课订单数']||0),0);html+='<td>'+(to/totalStores).toFixed(1)+'单</td>';return;}
    const natMap={'业绩完成率':nat['业绩完成率'],'拉新完成率':nat['拉新完成率'],'复购完成率':nat['复购完成率'],'退款率':nat['退款率'],'店均拉新':nat['店均拉新'],'复购率':nat['复购率'],'上课率':nat['上课率'],'体验课下单转化率':nat['体验课下单转化率'],'消课转化率':nat['消课转化率'],'拉新客单价':nat['拉新客单价'],'人力成本占比':nat['人力成本占比'],'教练比':nat['教练比'],'店均净收入':nat['店均净收入'],'复购店均净收入':nat['复购店均净收入'],'拉新店均净收入':nat['拉新店均净收入'],'盘点率_30':nat['盘点率_30'],'预估复购率_30':nat['预估复购率_30'],'咬合度_30':nat['咬合度_30'],'盘点率_90':nat['盘点率_90'],'预估复购率_90':nat['预估复购率_90'],'咬合度_90':nat['咬合度_90'],'复购目标占比':nat['复购目标占比']};
    if(natMap[col.key]!==undefined){html+='<td>'+(col.prefix||'')+natMap[col.key]+(col.suffix||'')+'</td>';return;}
    const vals=items.map(c=>c[col.key]).filter(v=>typeof v==='number');
    const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—';
    html+='<td>'+(col.prefix||'')+avg+(col.suffix||'')+'</td>';
  });
  html+='</tr></thead><tbody>';
  sorted.forEach(item=>{
    html+='<tr>';
    cols.forEach(col=>{
      if(col.render){
        const cls=(col.key==='city'||col.key==='manager'||col.key==='store')?'city-col':(col.key==='labels'?'text-col labels-col':'');
        html+='<td class="'+cls+'">'+col.render(item)+'</td>';
        return;
      }
      const v=item[col.key];
      let cls='';
      if(v==null){html+='<td><span style="color:#999">-</span></td>';return;}
      html+='<td class="'+cls+'">'+(col.prefix||'')+v+(col.suffix||'')+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

let storeFilterCity='all',storeFilterMgr='all',storeFilterLabel='all';

function renderStores(){
  const fs=getFilteredStores();
  let stores=aggregate(fs,'s','store');
  // Add city/manager info to store items
  stores.forEach(s=>{
    const raw=RAW.find(r=>r.s===s.store);
    if(raw){s.city=raw.c;s.manager=raw.m;}
  });
  // Apply store-level filters
  if(storeFilterCity!=='all')stores=stores.filter(s=>s.city===storeFilterCity);
  if(storeFilterMgr!=='all')stores=stores.filter(s=>s.manager===storeFilterMgr);
  if(storeFilterLabel!=='all')stores=stores.filter(s=>s.labels.includes(storeFilterLabel));
  const nat=getNatData(fs);
  document.getElementById('storeTableArea').innerHTML=buildTable(stores,storeCols,storeCats,storeSortKey,storeSortDir,'toggleStoreSort',fs.length,nat);
}

function renderAll(){
  const fs=getFilteredStores();
  const nat=getNatData(fs);
  const cities=aggregate(fs,'c','city');
  const mgrs=aggregate(fs,'m','manager');
  // Add cities list to managers
  mgrs.forEach(m=>{m.cities=[...new Set(fs.filter(s=>s.m===m.manager).map(s=>s.c))].sort();});
  
  document.getElementById('overviewPanel').innerHTML=buildTable(cities,cityCols,cityCats,sortKey,sortDir,'toggleSort',fs.length,nat);
  document.getElementById('managerPanel').innerHTML=buildTable(mgrs,mgrCols,mgrCats,mgrSortKey,mgrSortDir,'toggleMgrSort',fs.length,nat);

  if(tab==='overview')renderAll();
  if(tab==='manager')renderAll();
  if(tab==='stores'){initStoreFilters();renderStores();}
}

function onGlobalFilter(){
  filterType=document.getElementById('globalFilterType').value;
  filterStatus=document.getElementById('globalFilterStatus').value;
  renderAll();
}

document.getElementById('storeFilterCity').addEventListener('change',e=>{storeFilterCity=e.target.value;renderStores();});
document.getElementById('storeFilterMgr').addEventListener('change',e=>{storeFilterMgr=e.target.value;renderStores();});
document.getElementById('storeFilterLabel').addEventListener('change',e=>{storeFilterLabel=e.target.value;renderStores();});

// Password lock
function checkPwd(){
  const pwd=document.getElementById('lockInput').value;
  if(pwd==='FM2026'){
    document.getElementById('lockOverlay').classList.add('unlocked');
    document.getElementById('app').classList.add('show');
    document.getElementById('dateDisplay').textContent='数据日期: 2026-06-16';
  }else{
    document.getElementById('lockError').textContent='密码错误，请重试';
    document.getElementById('lockInput').value='';
    document.getElementById('lockInput').focus();
  }
}

// Initial render
renderAll();
</script>
