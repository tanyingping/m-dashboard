<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M馆城市问题诊断看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--card:#fff;--primary:#1a73e8;--primary-light:#e8f0fe;
  --danger:#ea4335;--danger-light:#fce8e6;--warning:#f9ab00;--warning-light:#fef7e0;
  --success:#34a853;--success-light:#e6f4ea;--text:#202124;--text2:#5f6368;
  --border:#e0e0e0;--sidebar-w:280px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.topbar{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar h1{font-size:20px;font-weight:600;letter-spacing:1px}
.topbar .meta{font-size:13px;opacity:.85}
.topbar .meta span{margin-left:16px}
.layout{min-height:calc(100vh - 70px)}
.main{flex:1;padding:20px;overflow-x:hidden}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;line-height:18px;white-space:nowrap}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-warning{background:var(--warning-light);color:#e37400}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-info{background:var(--primary-light);color:var(--primary)}
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-btn{padding:10px 24px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:var(--primary)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:2400px}
.data-table thead{background:#1a237e;color:#fff;position:sticky;top:0;z-index:3}
.data-table thead tr:first-child th{position:sticky;top:0;z-index:5}
.data-table thead tr:nth-child(2) th{position:sticky;top:32px;z-index:5}
.data-table .avg-row td{position:sticky;top:64px;z-index:4;background:#bbdefb;font-weight:700;font-size:13px;color:#0d47a1;border-bottom:2px solid #1565c0}
.data-table th.cat-header{padding:6px 6px;font-size:12px;letter-spacing:1px;font-weight:700;text-transform:uppercase}
.data-table th{padding:10px 6px;text-align:center;font-weight:600;white-space:nowrap;font-size:12px;cursor:pointer;user-select:none;position:relative;transition:background .15s}
.data-table th:hover{background:#283593}
.data-table th:first-child,.data-table td:first-child{position:sticky;left:0;z-index:2;min-width:70px}
.data-table th:first-child{z-index:4}
.data-table td:first-child{background:#fff}
.data-table tbody tr:hover td:first-child{background:#f5f7ff}
.data-table tbody tr.selected td:first-child{background:var(--primary-light)}
.data-table .avg-row td:first-child{background:#bbdefb;color:#0d47a1}
.data-table th:first-child::after,.data-table td:first-child::after{content:'';position:absolute;top:0;right:-6px;bottom:0;width:6px;pointer-events:none;background:linear-gradient(to right,rgba(0,0,0,.08),transparent)}
.data-table th.no-sort{cursor:default}
.data-table th.no-sort:hover{background:#1a237e}
.data-table th .sort-icon{font-size:10px;margin-left:2px;opacity:.5}
.data-table th .sort-icon.asc{opacity:1}
.data-table th .sort-icon.desc{opacity:1}
.data-table td{padding:7px 6px;text-align:center;border-bottom:1px solid #f0f0f0}
.data-table tbody tr{cursor:pointer;transition:background .15s}
.data-table tbody tr:hover{background:#f5f7ff}
.data-table tbody tr.selected{background:var(--primary-light)}
.data-table .city-col{text-align:left;font-weight:600;white-space:nowrap;min-width:70px}
.data-table .avg-row{background:#bbdefb;font-weight:700;cursor:default}
.data-table .avg-row:hover{background:#bbdefb}
.cell-good{color:var(--success);font-weight:600}
.cell-bad{color:var(--danger);font-weight:700}
.cell-warn{color:#e37400;font-weight:600}
.label-cell{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-start}
.text-col{text-align:left!important;min-width:160px;max-width:260px;font-size:12px;line-height:1.5;vertical-align:top}
.issue-line{display:flex;align-items:flex-start;gap:4px;padding:2px 0;color:var(--text)}
.issue-dot{flex-shrink:0;width:5px;height:5px;border-radius:50%;background:var(--danger);margin-top:6px}
.suggest-line{display:flex;align-items:flex-start;gap:4px;padding:2px 0;color:var(--primary)}
.suggest-arrow{flex-shrink:0;font-size:12px;margin-top:1px}
.no-issue{color:var(--border)}
.detail{display:none}
.detail.show{display:block}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.detail-header h2{font-size:22px;font-weight:700}
.detail-header .store-count{font-size:13px;color:var(--text2)}
.detail-labels{display:flex;gap:6px;flex-wrap:wrap}
.detail-labels .badge{font-size:12px;padding:3px 10px;line-height:22px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.metric-card.good::before{background:var(--success)}
.metric-card.bad::before{background:var(--danger)}
.metric-card.warn::before{background:var(--warning)}
.metric-card.neutral::before{background:var(--border)}
.metric-card .mc-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-card .mc-value{font-size:24px;font-weight:700}
.metric-card .mc-sub{font-size:11px;color:var(--text2);margin-top:2px}
.metric-card .mc-bench{font-size:11px;margin-top:4px}
.mc-bench.above{color:var(--success)}
.mc-bench.below{color:var(--danger)}
.section{background:var(--card);border-radius:10px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.section h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section h3 .icon{font-size:18px}
.issue-item{padding:8px 0;border-bottom:1px solid #f5f5f5;display:flex;gap:8px;align-items:flex-start}
.issue-item:last-child{border-bottom:none}
.issue-icon{flex-shrink:0;width:20px;text-align:center;margin-top:2px}
.issue-text{font-size:13px;line-height:1.5}
.issue-text.suggest{color:var(--primary)}
.issue-text.problem{color:var(--text)}
.store-chips{display:flex;flex-wrap:wrap;gap:6px}
.store-chip{background:#f0f2f5;padding:4px 10px;border-radius:6px;font-size:12px;color:var(--text2)}
.funnel{display:flex;align-items:center;gap:0;margin:12px 0;flex-wrap:wrap}
.funnel-step{text-align:center;padding:8px 16px;background:var(--primary-light);border-radius:8px;min-width:90px}
.funnel-step .fs-label{font-size:11px;color:var(--text2)}
.funnel-step .fs-value{font-size:18px;font-weight:700;color:var(--primary)}
.funnel-arrow{font-size:20px;color:var(--border);margin:0 4px;flex-shrink:0}
.compare-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.compare-bar .cb-label{width:90px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.compare-bar .cb-track{flex:1;height:20px;background:#f0f2f5;border-radius:4px;position:relative;overflow:hidden;max-width:300px}
.compare-bar .cb-fill{height:100%;border-radius:4px;transition:width .5s}
.compare-bar .cb-val{font-size:12px;font-weight:600;width:50px;flex-shrink:0}
.compare-bar .cb-avg{position:absolute;top:0;height:100%;width:2px;background:var(--danger);z-index:1}
@media(max-width:900px){
  .sidebar{display:none}
  .layout{flex-direction:column}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.lock-overlay{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1a237e,#1565c0);display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.lock-overlay.unlocked{opacity:0;pointer-events:none}
.lock-box{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:360px;width:90%}
.lock-box h2{font-size:18px;color:#1a237e;margin-bottom:6px}
.lock-box p{font-size:13px;color:#5f6368;margin-bottom:20px}
.lock-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;text-align:center;outline:none;transition:border .2s;letter-spacing:2px}
.lock-input:focus{border-color:#1a73e8}
.lock-btn{margin-top:16px;width:100%;padding:12px;border:none;border-radius:10px;background:#1a73e8;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.lock-btn:hover{background:#1557b0}
.lock-error{color:#ea4335;font-size:12px;margin-top:10px;min-height:18px}
#app{display:none}
#app.show{display:block}
.multi-select .ms-dropdown{max-height:250px;overflow-y:auto}.multi-select label:hover{background:#f5f5f5}.multi-select input[type=checkbox]{accent-color:var(--primary);width:14px;height:14px}
</style>
</head>

<div id="app">

</div>

function buildFilteredData(filter) {
  const stores = filterStores(filter);
  const nat = aggStores(stores);
  // By city
  const cityMap = {};
  stores.forEach(s => { (cityMap[s.city] = cityMap[s.city]||[]).push(s); });
  const cities = Object.entries(cityMap).map(([city, grp]) => {
    const a = aggStores(grp);
    a.city = city; a.stores = grp.map(s=>s.name);
    a.labels = grp.length>0 ? grp[0].labels : [];
    a.label_count = a.labels.length;
    return a;
  }).sort((a,b) => b.净销售额 - a.净销售额);
  // By manager
  const mgrMap = {};
  stores.forEach(s => { (mgrMap[s.mgr] = mgrMap[s.mgr]||[]).push(s); });
  const managers = Object.entries(mgrMap).map(([mgr, grp]) => {
    const a = aggStores(grp);
    a.manager = mgr; a.stores = grp.map(s=>s.name);
    a.cities = [...new Set(grp.map(s=>s.city))];
    a.labels = []; a.label_count = 0;
    return a;
  }).sort((a,b) => b.净销售额 - a.净销售额);
  // Store-level
  const storeRows = stores.map(s => ({
    store: s.name, city: s.city, manager: s.mgr, type: s.type, status: s.status,
    labels: s.labels, label_count: s.labels.length,
    业绩目标:s.pt, 净销售额:s.ns,

    复购完成率:s.fg_pt?Math.round(s.fg_ns/s.fg_pt*1000)/10:0,
    退款率:(s.refund+s.ns)>0?Math.round(s.refund/(s.refund+s.ns)*1000)/10:0,
    复购率:s.expire_30?Math.round(s.rebuy_30/s.expire_30*1000)/10:0,
    店均净收入:Math.round(s.ns), 复购店均净收入:s.fg_ns>0?Math.round(s.fg_ns):0,
    拉新店均净收入:s.lx_ns>0?Math.round(s.lx_ns):0,
    店均拉新:s.lx_users, 拉新客单价:s.lx_users?Math.round(s.lx_gmv/s.lx_users):0,
    复购客单价:s.fg_users?Math.round(s.fg_gmv/s.fg_users):null,
    体验课订单数:s.exp_orders, 店均体验课:s.exp_orders,
    派单率:s.exp_orders?Math.round(s.exp_dispatch/s.exp_orders*1000)/10:0,

    转化率:s.exp_class?Math.round(s.exp_convert/s.exp_class*1000)/10:0,
    体验课下单转化率:s.exp_class?Math.round(s.exp_convert/s.exp_class*1000)/10:0,
    消课转化率:s.exp_class?Math.round(s.exp_convert/s.exp_class*1000)/10:0,
    教练比:s.coach_ratio, 人力成本占比:s.hr_cost,

function buildFilterBar(containerId, filter, onTypeChange, onStatusChange) {
  const el = document.getElementById(containerId);
  if (!el) return;
  function renderGroup(id, label, allItems, selected, onChange) {
    const allSel = allItems.every(i => selected.has(i));
    const count = selected.size;
    let h = '<div style="position:relative;display:inline-block" class="multi-select" id="'+id+'">';
    h += '<div onclick="this.parentElement.classList.toggle(\'open\')" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;min-width:100px;user-select:none">';
    h += '<span style="color:#5f6368">'+label+'：</span>';
    h += allSel ? '<b>全部</b>' : '<b>'+count+'项</b>';
    h += ' <span style="font-size:10px;color:#999">▼</span></div>';
    h += '<div class="ms-dropdown" style="display:none;position:absolute;top:100%;left:0;z-index:100;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);min-width:160px;padding:6px 0;margin-top:4px">';
    h += '<label style="display:flex;align-items:center;padding:4px 12px;cursor:pointer;font-size:13px;gap:6px"><input type="checkbox" '+(allSel?'checked':'')+' onchange="var p=this.closest(\'.multi-select\');p.querySelectorAll(\'input[type=checkbox]:not(:first-child)\').forEach(c=>c.checked=this.checked);p.dispatchEvent(new Event(\'fc\'))">全选</label>';
    h += '<div style="height:1px;background:#e0e0e0;margin:4px 0"></div>';
    allItems.forEach(item => {
      h += '<label style="display:flex;align-items:center;padding:4px 12px;cursor:pointer;font-size:13px;gap:6px"><input type="checkbox" '+(selected.has(item)?'checked':'')+' value="'+item+'" onchange="this.closest(\'.multi-select\').dispatchEvent(new Event(\'fc\'))">'+item+'</label>';
    });
    h += '</div></div>';
    return h;
  }
  el.innerHTML = renderGroup(containerId+'_type','FM门店类型',ALL_TYPES,filter.types) + ' ' + renderGroup(containerId+'_status','营业状态',ALL_STATUSES,filter.statuses);
  // Add toggle + change handlers
  el.querySelectorAll('.multi-select').forEach(ms => {
    ms.querySelector(':scope > div:first-child').onclick = () => {
      // close others
      el.querySelectorAll('.multi-select').forEach(o => { if(o!==ms) o.classList.remove('open'); });
      ms.classList.toggle('open');
      ms.querySelectorAll('.ms-dropdown').forEach(d => d.style.display = ms.classList.contains('open') ? 'block' : 'none');
    };
    ms.addEventListener('fc', () => {
      const id = ms.id;
      const isType = id.endsWith('_type');
      const boxes = ms.querySelectorAll('input[type=checkbox]:not(:first-child)');
      const newSet = new Set();
      boxes.forEach(b => { if(b.checked) newSet.add(b.value); });
      if (newSet.size === 0) { boxes.forEach(b => { b.checked = true; newSet.add(b.value); }); }
      if (isType) { filter.types = newSet; onTypeChange(); }
      else { filter.statuses = newSet; onStatusChange(); }
    });
  });
  // Close on outside click
  document.addEventListener('click', e => {
    if (!el.contains(e.target)) el.querySelectorAll('.multi-select').forEach(ms => { ms.classList.remove('open'); ms.querySelectorAll('.ms-dropdown').forEach(d => d.style.display='none'); });
  });
}

function toggleStoreSort(key){if(storeSortKey===key){storeSortDir=storeSortDir==='asc'?'desc':'asc';}else{storeSortKey=key;storeSortDir='desc';}renderStores();}

function buildTable(items, cols, categories, sk, sd, toggleFn, totalStores, getValFn) {
  function sortIcon(key,sortable){
    if(sortable===false)return'';
    if(sk===key)return sd==='asc'?'<span class="sort-icon asc">▲</span>':'<span class="sort-icon desc">▼</span>';
    return'<span class="sort-icon">⇅</span>';
  }
  let sorted=[...items];
  if(sk){
    sorted.sort((a,b)=>{
      let va=getValFn(a,sk),vb=getValFn(b,sk);
      if(typeof va==='string')return sd==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      if(va==null)va=-Infinity; if(vb==null)vb=-Infinity;
      return sd==='asc'?(va-vb):(vb-va);
    });
  }
  let html='<div class="table-wrap"><table class="data-table"><thead><tr>';
  categories.forEach(cat=>{
    if(cat.label){
      html+=`<th colspan="${cat.span}" class="cat-header" style="background:${cat.color};border-bottom:1px solid rgba(255,255,255,.2);font-size:13px;letter-spacing:1px;text-align:center">${cat.label}</th>`;
    }else{
      html+=`<th colspan="${cat.span}" class="no-sort" style="background:#1a237e"></th>`;
    }
  });
  html+='</tr><tr>';
  cols.forEach(col=>{
    const icon=sortIcon(col.key,col.sortable);
    const cls=col.sortable===false?' class="no-sort"':'';
    const onclick=col.sortable!==false?` onclick="${toggleFn}('${col.key}')"`:''
    html+=`<th${cls}${onclick}>${col.label}${icon}</th>`;
  });
  // Avg row in thead (sticky)
  html+='</tr><tr class="avg-row">';
  html+='<td class="city-col" style="position:sticky;left:0;z-index:5;background:#bbdefb;font-weight:700;color:#0d47a1;min-width:70px;border-bottom:2px solid #1565c0">全国均值</td>';
  cols.slice(1).forEach(col=>{
    if(['labels','cities','store','manager','city'].includes(col.key)){html+='<td></td>';return;}
    if(col.key==='store_count'){html+=`<td>${totalStores}</td>`;return;}
    if(col.key==='复购客单价'){html+=`<td>${nat.复购客单价!=null?'¥'+nat.复购客单价:'-'}</td>`;return;}
    if(col.key==='盘点金额_30'){html+=`<td>${(nat.盘点金额_30/10000).toFixed(1)}万</td>`;return;}
    if(col.key==='盘点金额_90'){html+=`<td>${(nat.盘点金额_90/10000).toFixed(1)}万</td>`;return;}
    if(col.key==='店均体验课'){const to=items.reduce((s,c)=>s+(c.体验课订单数||0),0);html+=`<td>${(to/totalStores).toFixed(1)}单</td>`;return;}
    const natMap={'业绩完成率':nat.业绩完成率,'拉新完成率':nat.拉新完成率,'复购完成率':nat.复购完成率,'退款率':nat.退款率,'店均拉新':nat.店均拉新,'复购率':nat.复购率,'上课率':nat.上课率,'体验课下单转化率':nat.体验课下单转化率,'消课转化率':nat.消课转化率,'拉新客单价':nat.拉新客单价,'人力成本占比':nat.人力成本占比,'教练比':nat.教练比,'店均净收入':nat.店均净收入,'复购店均净收入':nat.复购店均净收入,'拉新店均净收入':nat.拉新店均净收入,'盘点率_30':nat.盘点率_30,'预估复购率_30':nat.预估复购率_30,'咬合度_30':nat.咬合度_30,'盘点率_90':nat.盘点率_90,'预估复购率_90':nat.预估复购率_90,'咬合度_90':nat.咬合度_90,'复购目标占比':nat.复购目标占比};
    if(natMap[col.key]!==undefined){html+=`<td>${(col.prefix||'')+natMap[col.key]+(col.suffix||'')}</td>`;return;}
    const vals=items.map(c=>c[col.key]).filter(v=>typeof v==='number');
    const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—';
    html+=`<td>${(col.prefix||'')+avg+(col.suffix||'')}</td>`;
  });
  html+='</tr></thead><tbody>';
  sorted.forEach(item=>{
    const oc = '';
    html+=`<tr onclick="${oc}" class="">`;
    cols.forEach(col=>{
      if(col.render){
        const cls=(col.key==='city'||col.key==='manager'||col.key==='store')?'city-col':(col.key==='labels'?'text-col':'');
        html+=`<td class="${cls}">${col.render(item)}</td>`;
        return;
      }
      const v=item[col.key];
      let cls='';
      if(v==null){html+=`<td><span style="color:#999">-</span></td>`;return;}
      if(col.bench!==undefined){
        if(col.isCost){cls=v>col.bench?'cell-warn':'cell-good';}
        else if(col.lower){cls=v>=col.bench?'cell-good':v<col.bench*0.7?'cell-bad':'cell-warn';}
        else{cls=v<=col.bench?'cell-good':v>col.bench+10?'cell-bad':'cell-warn';}
      }
      const display=(col.prefix||'')+v+(col.suffix||'');
      html+=`<td class="${cls}">${display}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

let storeFiltersInited = false;
function initStoreFilters(){
  if(storeFiltersInited)return;
  storeFiltersInited=true;
  const data = buildFilteredData(storeFilter);
  const cs=['全部',...data.cities.map(c=>c.city)];
  const ms=['全部',...data.managers.map(m=>m.manager)];
  const ls=['全部','综合偏低','退款异常','退款偏高','拉新瓶颈','拉新偏弱','复购乏力','体验课转化弱','体验课到课低','人力成本偏高','表现良好','需持续关注'];
  document.getElementById('storeFilterCity').innerHTML=cs.map(c=>'<option>'+c+'</option>').join('');
  document.getElementById('storeFilterMgr').innerHTML=ms.map(m=>'<option>'+m+'</option>').join('');
  document.getElementById('storeFilterLabel').innerHTML=ls.map(l=>'<option>'+l+'</option>').join('');
}

function renderStores(){
  const data = buildFilteredData(storeFilter);
  nat = data.national;
  buildFilterBar('storeFilterBar', storeFilter, renderStores, renderStores);
  nat = data.national;
  // Refresh city/manager/label options based on current filter
  const cs=['全部',...data.cities.map(c=>c.city)];
  const ms=['全部',...data.managers.map(m=>m.manager)];
  const prevCity=document.getElementById('storeFilterCity').value;
  const prevMgr=document.getElementById('storeFilterMgr').value;
  document.getElementById('storeFilterCity').innerHTML=cs.map(c=>'<option'+(c===prevCity?' selected':'')+'>'+c+'</option>').join('');
  document.getElementById('storeFilterMgr').innerHTML=ms.map(m=>'<option'+(m===prevMgr?' selected':'')+'>'+m+'</option>').join('');
  const fc=document.getElementById('storeFilterCity').value;
  const fm=document.getElementById('storeFilterMgr').value;
  const fl=document.getElementById('storeFilterLabel').value;
  let filtered=data.stores.filter(s=>{
    if(fc!=='全部'&&s.city!==fc)return false;
    if(fm!=='全部'&&s.manager!==fm)return false;
    if(fl!=='全部'&&!s.labels.includes(fl))return false;
    return true;
  });
  const tableArea=document.getElementById('storeTableArea');
  const info='<div style="font-size:13px;color:#5f6368;margin-bottom:8px">共 '+filtered.length+' 家门店'+(fc!=='全部'?' | '+fc:'')+(fm!=='全部'?' | 区经:'+fm:'')+(fl!=='全部'?' | 标签:'+fl:'')+'</div>';
  tableArea.innerHTML=info+buildTable(filtered,storeCols,storeCats,storeSortKey,storeSortDir,'toggleStoreSort',data.total_stores,gv);
  document.getElementById('storesPanel').className='fade-in';
}

function renderDetail(name){
  const data = buildFilteredData(dtlFilter);
  const localNat = data.national;
  const c = data.cities.find(x=>x.city===name);
  if(!c)return;
  const panel=document.getElementById('detailPanel');
  buildFilterBar('dtlFilterBar', dtlFilter, ()=>renderDetail(name), ()=>renderDetail(name));
  function ms(val,bench,lower){
    if(bench===undefined)return 'neutral';
    if(lower)return val>=bench?'good':val<bench*0.7?'bad':'warn';
    return val<=bench?'good':val>bench+10?'bad':'warn';
  }
  function bt(val,bench,lower){
    if(bench===undefined)return'';
    if(lower)return val>=bench?`<span class="mc-bench above">高于均值 ${bench}%</span>`:`<span class="mc-bench below">低于均值 ${bench}%</span>`;
    return val<=bench?`<span class="mc-bench above">低于均值 ${bench}%</span>`:`<span class="mc-bench below">高于均值 ${bench}%</span>`;
  }
  const metrics=[
    {label:'业绩完成率',value:c.业绩完成率+'%',status:ms(c.业绩完成率,localNat.业绩完成率,true),bench:bt(c.业绩完成率,localNat.业绩完成率,true),sub:`目标${(c.业绩目标/10000).toFixed(0)}万 / 实际${(c.净销售额/10000).toFixed(1)}万`},
    {label:'店均净收入',value:'¥'+c.店均净收入,status:ms(c.店均净收入,localNat.店均净收入,true),bench:bt(c.店均净收入,localNat.店均净收入,true).replace('%','元'),sub:`${c.store_count}家门店`},

    const color=invert?(val<=benchVal?'var(--success)':val>benchVal+10?'var(--danger)':'var(--warning)'):
                       (val>=benchVal?'var(--success)':val<benchVal*0.7?'var(--danger)':'var(--warning)');
    return`<div class="compare-bar">
      <span class="cb-label">${label}</span>
      <div class="cb-track"><div class="cb-fill" style="width:${pct}%;background:${color}"></div><div class="cb-avg" style="left:${benchPct}%" title="均值 ${benchVal}%"></div></div>
      <span class="cb-val" style="color:${color}">${val}%</span>

      ${compareBar('复购率',c.复购率,localNat.复购率,false)}
      ${compareBar('上课率',c.上课率,localNat.上课率,false)}
      ${compareBar('转化率',c.转化率,localNat.转化率,false)}

      </div>
    </div>`;
  html+=`<div class="section fade-in"><h3><span class="icon">🏪</span> 门店列表（${c.stores.length}家）</h3>
    <div class="store-chips">${c.stores.map(s=>`<span class="store-chip">${s}</span>`).join('')}</div></div>`;
  panel.innerHTML=html;
  panel.classList.add('show');
}

const REWARD_TABLE = {
  'A': {1:4000, 2:3500, 3:3000, 6:2500},
  'B': {1:3000, 2:2500, 3:2000, 6:1500, 10:1000, 15:800},
  'C': {1:2500, 2:2000, 3:1500, 6:1000, 10:800, 15:500, 20:300}
};

function getGroup(pt) {
  if (pt >= 200000) return 'A';
  if (pt >= 150000) return 'B';
  return 'C';
}

function getGroupName(g) {
  return g==='A'?'A组(头部)':g==='B'?'B组(中高)':'C组(中腰)';
}

function getReward(group, rank) {
  const table = REWARD_TABLE[group];
  for (const [maxRank, reward] of Object.entries(table).sort((a,b)=>b[0]-a[0])) {
    if (rank <= parseInt(maxRank)) return reward;
  }
  return null;
}

let incSortKey = 'rank', incSortDir = 'asc';
let incFilterCity = 'all', incFilterMgr = 'all', incFilterName = '', incFilterGroup = 'all';
let incRewardExpanded = true;

function toggleIncSort(key) {
  if (incSortKey === key) { incSortDir = incSortDir==='asc'?'desc':'asc'; }
  else { incSortKey = key; incSortDir = key==='rank'?'asc':'desc'; }
  renderIncentive();
}

function populateIncFilterOptions() {
  const cities = [...new Set(INC_STORES.map(s=>s.c))].sort();
  const mgrs = [...new Set(INC_STORES.map(s=>s.m))].sort();
  document.getElementById('incFilterCity').innerHTML = '<option value="all">全部城市</option>' + cities.map(c=>'<option value="'+c+'"'+(c===incFilterCity?' selected':'')+'>'+c+'</option>').join('');
  document.getElementById('incFilterMgr').innerHTML = '<option value="all">全部区经</option>' + mgrs.map(m=>'<option value="'+m+'"'+(m===incFilterMgr?' selected':'')+'>'+m+'</option>').join('');
  document.getElementById('incFilterGroup').value = incFilterGroup;
  document.getElementById('incFilterName').value = incFilterName;
}

function renderIncentive() {
  // Prepare data with group and rank
  const data = INC_STORES.map(s => ({
    ...s,
    group: getGroup(s.pt),
    groupTarget: s.pt >= 200000 ? '≥20万' : (s.pt >= 150000 ? '≥15万' : '<15万'),
    baseline: (s.pt * 0.8 > 100000 ? s.pt * 0.8 : 100000) <= s.ns,
    crGap: Math.max(0, 80 - s.cr),
    nsGap: Math.max(0, 100000 - s.ns),
  }));

  // Rank within each group (on full data, before filtering)
  ['A','B','C'].forEach(g => {
    const groupStores = data.filter(s => s.group === g).sort((a,b) => b.ns - a.ns);
    groupStores.forEach((s, i) => { s.rank = i + 1; s.groupSize = groupStores.length; });
  });

  // Assign reward
  data.forEach(s => { s.reward = getReward(s.group, s.rank); });

  // Apply filters
  let filtered = data;
  if (incFilterGroup !== 'all') filtered = filtered.filter(s => s.group === incFilterGroup);
  if (incFilterCity !== 'all') filtered = filtered.filter(s => s.c === incFilterCity);
  if (incFilterMgr !== 'all') filtered = filtered.filter(s => s.m === incFilterMgr);
  if (incFilterName) filtered = filtered.filter(s => s.s.includes(incFilterName));

  // Sort
  let sorted = [...filtered];
  const gv = (item, key) => {
    if (key === 'group') return item.group;
    if (key === 'rank') return item.rank;
    if (key === 'baseline') return item.baseline ? 1 : 0;
    if (key === 'reward') return item.reward || 0;
    return item[key];
  };
  if (incSortKey) {
    sorted.sort((a,b) => {
      let va = gv(a, incSortKey), vb = gv(b, incSortKey);
      if (incSortKey === 'group') {
        va = a.group; vb = b.group;
        return incSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      }
      if (typeof va === 'string') return incSortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      if (va == null) va = -Infinity; if (vb == null) vb = -Infinity;
      return incSortDir === 'asc' ? (va - vb) : (vb - va);
    });
  }

  function sortIcon(key, sortable) {
    if (sortable === false) return '';
    if (incSortKey === key) return incSortDir === 'asc' ? '<span class="sort-icon asc">▲</span>' : '<span class="sort-icon desc">▼</span>';
    return '<span class="sort-icon">⇅</span>';
  }

  const cols = [
    {key:'group', label:'分组', sortable:true},
    {key:'rank', label:'排名', sortable:true},
    {key:'s', label:'门店名称', sortable:true},
    {key:'t', label:'门店类型', sortable:true},
    {key:'c', label:'城市', sortable:true},
    {key:'m', label:'区域经理', sortable:true},
    {key:'pt', label:'业绩目标', sortable:true, fmt:v=>(v/10000).toFixed(1)+'万'},
    {key:'ns', label:'净收入', sortable:true, fmt:v=>'¥'+(v/10000).toFixed(2)+'万'},
    {key:'cr', label:'完成率', sortable:true, fmt:v=>v.toFixed(1)+'%'},
    {key:'baseline', label:'底线目标', sortable:true},
    {key:'reward', label:'预估奖励', sortable:true},
  ];

  let html = '';
  // Filter bar with inline event handlers
  html += '<div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center">';
  html += '<label style="font-size:13px;color:#5f6368">分组：</label>';
  html += '<select id="incFilterGroup" onchange="incFilterGroup=this.value;renderIncentive()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px">';
  html += '<option value="all">全部分组</option>';
  html += '<option value="A">A组(头部)</option><option value="B">B组(中高)</option><option value="C">C组(中腰)</option>';
  html += '</select>';
  html += '<label style="font-size:13px;color:#5f6368;margin-left:8px">城市：</label>';
  html += '<select id="incFilterCity" onchange="incFilterCity=this.value;renderIncentive()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>';
  html += '<label style="font-size:13px;color:#5f6368;margin-left:8px">区经：</label>';
  html += '<select id="incFilterMgr" onchange="incFilterMgr=this.value;renderIncentive()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>';
  html += '<label style="font-size:13px;color:#5f6368;margin-left:8px">门店名称：</label>';
  html += '<input id="incFilterName" type="text" placeholder="搜索门店..." oninput="incFilterName=this.value;renderIncentive()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:180px">';
  html += '<span style="font-size:12px;color:#999;margin-left:8px">共 ' + filtered.length + ' 家门店</span>';
  html += '</div>';

  // Collapsible reward reference table
  html += '<div style="background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">';
  html += '<div onclick="incRewardExpanded=!incRewardExpanded;renderIncentive()" style="font-size:14px;font-weight:600;color:#1a237e;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px">';
  html += '<span style="display:inline-block;transition:transform 0.2s;transform:rotate(' + (incRewardExpanded ? '90' : '0') + 'deg);font-size:12px">▶</span>';
  html += '奖励标准</div>';
  if (incRewardExpanded) {
    html += '<table style="font-size:12px;border-collapse:collapse;width:100%;margin-top:10px"><tr style="background:#f5f5f5"><th style="padding:6px 10px;text-align:left;border:1px solid #e0e0e0">分组</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">第1名</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">第2名</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">第3名</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">4-6名</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">7-10名</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">11-15名</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">16-20名</th></tr>';
    [['A','A组(头部)'],['B','B组(中高)'],['C','C组(中腰)']].forEach(([g,name])=>{
      const t = REWARD_TABLE[g];
      const vals = [t[1]||'—',t[2]||'—',t[3]||'—',t[6]||'—',t[10]||'—',t[15]||'—',t[20]||'—'];
      html += '<tr><td style="padding:6px 10px;border:1px solid #e0e0e0;font-weight:600">' + name + '</td>';
      vals.forEach(v => { html += '<td style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">' + (v==='—'?'<span style="color:#999">—</span>':'¥'+v) + '</td>'; });
      html += '</tr>';
    });
    html += '</table>';
    html += '<div style="font-size:11px;color:#999;margin-top:6px">底线目标：净收入需达到 max(业绩目标×80%, 10万)。预估奖励仅按排名计算，实际发放需达成底线目标。</div>';
  }
  html += '</div>';

  // Main table
  html += '<div class="table-wrap"><table class="data-table" style="min-width:1600px"><thead><tr>';
  cols.forEach(col => {
    const icon = sortIcon(col.key, col.sortable);
    const cls = col.sortable === false ? ' class="no-sort"' : '';
    const onclick = col.sortable !== false ? ' onclick="toggleIncSort(\'' + col.key + '\')"' : '';
    html += '<th' + cls + onclick + '>' + col.label + icon + '</th>';
  });
  html += '</tr></thead><tbody>';

  let prevGroup = '';
  sorted.forEach(s => {
    // Group separator row
    if (s.group !== prevGroup) {
      prevGroup = s.group;
      html += '<tr style="background:#1a237e"><td colspan="' + cols.length + '" style="color:#fff;font-weight:700;font-size:13px;padding:8px 12px;text-align:left">' + getGroupName(s.group) + '（' + s.groupSize + '家门店）</td></tr>';
    }

    const rowBg = s.baseline ? '' : 'background:#fafafa;';
    html += '<tr style="' + rowBg + '">';
    cols.forEach(col => {
      if (col.key === 'group') {
        const colors = {A:'#b71c1c',B:'#e65100',C:'#1b5e20'};
        html += '<td><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff;background:' + colors[s.group] + '">' + s.group + '</span></td>';
      } else if (col.key === 'rank') {
        const medal = s.rank <= 3 ? ['🥇','🥈','🥉'][s.rank-1] : '';
        html += '<td style="font-weight:700">' + medal + s.rank + '</td>';
      } else if (col.key === 's') {
        html += '<td style="text-align:left;font-weight:600;font-size:12px;min-width:180px;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + s.s + '">' + s.s + '</td>';
      } else if (col.key === 't') {
        html += '<td style="font-size:11px">' + s.t + '</td>';
      } else if (col.key === 'baseline') {
        const threshold = s.pt * 0.8 > 100000 ? s.pt * 0.8 : 100000;
        const gap = threshold - s.ns;
        if (gap <= 0) {
          html += '<td style="color:#34a853;font-weight:700">已达成</td>';
        } else {
          html += '<td style="color:#ea4335;font-weight:600">差' + (gap/10000).toFixed(1) + '万</td>';
        }
      } else if (col.key === 'reward') {
        if (s.reward != null) {
          const opacity = s.baseline ? '1' : '0.45';
          html += '<td style="font-weight:700;font-size:14px;color:#e65100;opacity:' + opacity + '">¥' + s.reward.toLocaleString() + '</td>';
        } else {
          html += '<td style="color:#999">—</td>';
        }
      } else if (col.key === 'cr') {
        const color = s.cr >= 80 ? '#34a853' : (s.cr >= 50 ? '#e37400' : '#ea4335');
        html += '<td style="color:' + color + ';font-weight:600">' + s.cr.toFixed(1) + '%</td>';
      } else if (col.key === 'ns') {
        const color = s.ns >= 100000 ? '#34a853' : '#ea4335';
        html += '<td style="color:' + color + ';font-weight:600">¥' + (s.ns/10000).toFixed(2) + '万</td>';
      } else if (col.key === 'pt') {
        html += '<td>¥' + (s.pt/10000).toFixed(1) + '万</td>';
      } else {
        html += '<td>' + (s[col.key] || '') + '</td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById('incentivePanel').innerHTML = html;
  // Restore filter values after innerHTML rebuild
  populateIncFilterOptions();
  document.getElementById('incentivePanel').className = 'fade-in';
}



// === LX RACE (拉新赛马) ===
const LX_ZONES = [
  {name:'北京+天津', cities:['北京市','天津市'], topN:10, rewards:{1:888,5:588,10:388}},
  {name:'杭州+宁波', cities:['杭州市','宁波市'], topN:10, rewards:{1:888,5:588,10:388}},
  {name:'深圳', cities:['深圳市'], topN:5, rewards:{1:888,3:588,5:388}},
  {name:'上海+苏州+无锡', cities:['上海市','苏州市','无锡市'], topN:5, rewards:{1:888,3:588,5:388}},
  {name:'武汉+长沙', cities:['武汉市','长沙市'], topN:5, rewards:{1:888,3:588,5:388}},
  {name:'南京+合肥', cities:['南京市','合肥市'], topN:5, rewards:{1:888,3:588,5:388}},
  {name:'郑州+西安+济南+青岛', cities:['郑州市','西安市','济南市','青岛市'], topN:3, rewards:{1:888,2:588,3:388}},
  {name:'广州', cities:['广州市'], topN:3, rewards:{1:888,2:588,3:388}},
  {name:'重庆+成都', cities:['重庆市','成都市'], topN:3, rewards:{1:888,2:588,3:388}}
];

function getLxZoneReward(zone, rank) {
  if (rank > zone.topN) return null;
  const tiers = Object.entries(zone.rewards).sort((a,b) => b[0]-a[0]);
  for (const [maxRank, reward] of tiers) {
    if (rank <= parseInt(maxRank)) return reward;
  }
  return null;
}

let lxSortKey = 'rank', lxSortDir = 'asc';
let lxFilterZone = 'all', lxFilterCity = 'all', lxFilterMgr = 'all', lxFilterName = '';
let lxRewardExpanded = true;

function toggleLxSort(key) {
  if (lxSortKey === key) { lxSortDir = lxSortDir==='asc'?'desc':'asc'; }
  else { lxSortKey = key; lxSortDir = key==='rank'?'asc':'desc'; }
  renderLxRace();
}

function renderLxRace() {
  // Calculate effective lx (FM包月馆 /2)
  const data = INC_STORES.map(s => ({
    ...s,
    lxRaw: s.lx,
    lxEff: s.t === 'FM包月馆' ? Math.floor(s.lx / 2) : s.lx,
    baseline: (s.t === 'FM包月馆' ? Math.floor(s.lx / 2) : s.lx) >= 10
  }));

  // Assign zone and rank within each zone
  const zoneData = {};
  LX_ZONES.forEach(zone => {
    const zoneStores = data.filter(s => zone.cities.includes(s.c))
      .sort((a,b) => b.lxEff - a.lxEff || a.s.localeCompare(b.s));
    zoneStores.forEach((s, i) => {
      s.zoneName = zone.name;
      s.zoneTopN = zone.topN;
      s.rank = i + 1;
      s.zoneSize = zoneStores.length;
      s.reward = getLxZoneReward(zone, s.rank);
    });
    zoneData[zone.name] = zoneStores;
  });

  // Apply filters
  let filtered = data;
  if (lxFilterZone !== 'all') filtered = filtered.filter(s => s.zoneName === lxFilterZone);
  if (lxFilterCity !== 'all') filtered = filtered.filter(s => s.c === lxFilterCity);
  if (lxFilterMgr !== 'all') filtered = filtered.filter(s => s.m === lxFilterMgr);
  if (lxFilterName) filtered = filtered.filter(s => s.s.includes(lxFilterName));

  // Sort
  let sorted = [...filtered];
  const gv = (item, key) => {
    if (key === 'rank') return item.rank;
    if (key === 'zoneName') return item.zoneName;
    if (key === 'baseline') return item.baseline ? 1 : 0;
    if (key === 'reward') return item.reward || 0;
    return item[key];
  };
  if (lxSortKey) {
    sorted.sort((a,b) => {
      let va = gv(a, lxSortKey), vb = gv(b, lxSortKey);
      if (lxSortKey === 'zoneName') return lxSortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      if (typeof va === 'string') return lxSortDir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      if (va == null) va = -Infinity; if (vb == null) vb = -Infinity;
      return lxSortDir === 'asc' ? (va - vb) : (vb - va);
    });
  }

  function sortIcon(key) {
    if (lxSortKey === key) return lxSortDir === 'asc' ? '<span class="sort-icon asc">▲</span>' : '<span class="sort-icon desc">▼</span>';
    return '<span class="sort-icon">⇅</span>';
  }

  const cols = [
    {key:'zoneName', label:'赛区'},
    {key:'rank', label:'排名'},
    {key:'s', label:'门店名称'},
    {key:'t', label:'门店类型'},
    {key:'c', label:'城市'},
    {key:'m', label:'区域经理'},
    {key:'lxRaw', label:'真实拉新'},
    {key:'lxEff', label:'计入排名'},
    {key:'baseline', label:'底线(≥10)'},
    {key:'reward', label:'预估奖励'}
  ];

  let html = '';

  // Filter bar
  const allCities = [...new Set(INC_STORES.map(s=>s.c))].sort();
  const allMgrs = [...new Set(INC_STORES.map(s=>s.m))].sort();
  html += '<div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center">';
  html += '<label style="font-size:13px;color:#5f6368">赛区：</label>';
  html += '<select id="lxFilterZone" onchange="lxFilterZone=this.value;renderLxRace()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:140px">';
  html += '<option value="all">全部赛区</option>';
  LX_ZONES.forEach(z => { html += '<option value="'+z.name+'">'+z.name+'</option>'; });
  html += '</select>';
  html += '<label style="font-size:13px;color:#5f6368;margin-left:8px">城市：</label>';
  html += '<select id="lxFilterCity" onchange="lxFilterCity=this.value;renderLxRace()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>';
  html += '<label style="font-size:13px;color:#5f6368;margin-left:8px">区经：</label>';
  html += '<select id="lxFilterMgr" onchange="lxFilterMgr=this.value;renderLxRace()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>';
  html += '<label style="font-size:13px;color:#5f6368;margin-left:8px">门店名称：</label>';
  html += '<input id="lxFilterName" type="text" placeholder="搜索门店..." oninput="lxFilterName=this.value;renderLxRace()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:180px">';
  html += '<span style="font-size:12px;color:#999;margin-left:8px">共 ' + filtered.length + ' 家门店</span>';
  html += '</div>';

  // Collapsible reward reference table
  html += '<div style="background:#fff;border-radius:10px;padding:14px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)">';
  html += '<div onclick="lxRewardExpanded=!lxRewardExpanded;renderLxRace()" style="font-size:14px;font-weight:600;color:#1a237e;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px">';
  html += '<span style="display:inline-block;transition:transform 0.2s;transform:rotate(' + (lxRewardExpanded?'90':'0') + 'deg);font-size:12px">▶</span>';
  html += '奖励标准</div>';
  if (lxRewardExpanded) {
    html += '<table style="font-size:12px;border-collapse:collapse;width:100%;margin-top:10px">';
    html += '<tr style="background:#f5f5f5"><th style="padding:6px 10px;text-align:left;border:1px solid #e0e0e0">赛区</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">城市</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">奖励名额</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">第1名</th><th style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">其余名次</th></tr>';
    LX_ZONES.forEach(zone => {
      const rewardDesc = Object.entries(zone.rewards).sort((a,b)=>a[0]-b[0]).map(([r,v]) => {
        const rInt = parseInt(r);
        if (rInt === 1) return '第1名 ¥'+v;
        return '第'+(zone.topN===10?((rInt<=5?'2-5':'6-10')):(zone.topN===5?(rInt<=3?'2-3':'4-5'):'第'+rInt))+'名 ¥'+v;
      }).join('；');
      html += '<tr>';
      html += '<td style="padding:6px 10px;border:1px solid #e0e0e0;font-weight:600">' + zone.name + '</td>';
      html += '<td style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0;font-size:11px">' + zone.cities.join('、') + '</td>';
      html += '<td style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0">前' + zone.topN + '名</td>';
      html += '<td style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0;font-weight:700;color:#e65100">¥888</td>';
      html += '<td style="padding:6px 10px;text-align:center;border:1px solid #e0e0e0;font-size:11px">' + rewardDesc.substring(rewardDesc.indexOf('；')+1) + '</td>';
      html += '</tr>';
    });
    html += '</table>';
    html += '<div style="font-size:11px;color:#999;margin-top:6px">底线要求：计入排名的拉新数 ≥ 10人。FM包月馆计入排名 = 真实拉新÷2，FM私教馆不除。预估奖励仅按排名计算，实际发放需达成底线。</div>';
  }
  html += '</div>';

  // Main table
  html += '<div class="table-wrap"><table class="data-table" style="min-width:1400px"><thead><tr>';
  cols.forEach(col => {
    const icon = sortIcon(col.key);
    const onclick = ' onclick="toggleLxSort(\''+col.key+'\')"';
    html += '<th' + onclick + '>' + col.label + icon + '</th>';
  });
  html += '</tr></thead><tbody>';

  let prevZone = '';
  sorted.forEach(s => {
    if (s.zoneName !== prevZone) {
      prevZone = s.zoneName;
      html += '<tr style="background:#1a237e"><td colspan="' + cols.length + '" style="color:#fff;font-weight:700;font-size:13px;padding:8px 12px;text-align:left">' + s.zoneName + '赛区（' + s.zoneSize + '家门店，奖励前' + s.zoneTopN + '名）</td></tr>';
    }
    const rowBg = s.baseline ? '' : 'background:#fafafa;';
    html += '<tr style="' + rowBg + '">';
    cols.forEach(col => {
      if (col.key === 'zoneName') {
        html += '<td style="font-size:11px;font-weight:600">' + s.zoneName + '</td>';
      } else if (col.key === 'rank') {
        const medal = s.rank <= 3 ? ['🥇','🥈','🥉'][s.rank-1] : '';
        const inRange = s.rank <= s.zoneTopN;
        html += '<td style="font-weight:700;color:'+(inRange?'#e65100':'#999')+'">' + medal + s.rank + '</td>';
      } else if (col.key === 's') {
        html += '<td style="text-align:left;font-weight:600;font-size:12px;min-width:180px;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + s.s + '">' + s.s + '</td>';
      } else if (col.key === 't') {
        html += '<td style="font-size:11px">' + s.t + '</td>';
      } else if (col.key === 'lxRaw') {
        html += '<td style="font-weight:600">' + s.lxRaw + '</td>';
      } else if (col.key === 'lxEff') {
        const color = s.lxEff >= 10 ? '#34a853' : '#ea4335';
        html += '<td style="font-weight:700;color:' + color + '">' + s.lxEff + (s.t==='FM包月馆'?'<span style="font-size:10px;color:#999"> (÷2)</span>':'') + '</td>';
      } else if (col.key === 'baseline') {
        if (s.baseline) {
          html += '<td style="color:#34a853;font-weight:700">已达成</td>';
        } else {
          html += '<td style="color:#ea4335;font-weight:600">差' + (10 - s.lxEff) + '人</td>';
        }
      } else if (col.key === 'reward') {
        if (s.reward != null) {
          const opacity = s.baseline ? '1' : '0.45';
          html += '<td style="font-weight:700;font-size:14px;color:#e65100;opacity:' + opacity + '">¥' + s.reward + '</td>';
        } else {
          html += '<td style="color:#999">—</td>';
        }
      } else {
        html += '<td>' + (s[col.key] || '') + '</td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById('lxPanel').innerHTML = html;

  // Restore filter values
  document.getElementById('lxFilterZone').value = lxFilterZone;
  const citySel = document.getElementById('lxFilterCity');
  citySel.innerHTML = '<option value="all">全部城市</option>' + allCities.map(c=>'<option value="'+c+'"'+(c===lxFilterCity?' selected':'')+'>'+c+'</option>').join('');
  const mgrSel = document.getElementById('lxFilterMgr');
  mgrSel.innerHTML = '<option value="all">全部区经</option>' + allMgrs.map(m=>'<option value="'+m+'"'+(m===lxFilterMgr?' selected':'')+'>'+m+'</option>').join('');
  document.getElementById('lxFilterName').value = lxFilterName;

  document.getElementById('lxPanel').className = 'fade-in';
}

</script>
</div>
