<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M馆城市问题诊断看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--card:#fff;--primary:#1a73e8;--primary-light:#e8f0fe;
  --danger:#ea4335;--danger-light:#fce8e6;--warning:#f9ab00;--warning-light:#fef7e0;
  --success:#34a853;--success-light:#e6f4ea;--text:#202124;--text2:#5f6368;
  --border:#e0e0e0;--sidebar-w:280px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.topbar{background:linear-gradient(135deg,#1a237e,#1565c0);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar h1{font-size:20px;font-weight:600;letter-spacing:1px}
.topbar .meta{font-size:13px;opacity:.85}
.topbar .meta span{margin-left:16px}
.layout{min-height:calc(100vh - 70px)}
.main{flex:1;padding:20px;overflow-x:hidden}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;line-height:18px;white-space:nowrap}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-warning{background:var(--warning-light);color:#e37400}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-info{background:var(--primary-light);color:var(--primary)}
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-btn{padding:10px 24px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:var(--primary)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
table.data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:2400px}
.data-table thead{background:#1a237e;color:#fff;position:sticky;top:0;z-index:3}
.data-table thead tr:first-child th{position:sticky;top:0;z-index:5}
.data-table thead tr:nth-child(2) th{position:sticky;top:32px;z-index:5}
.data-table .avg-row td{position:sticky;top:64px;z-index:4;background:#bbdefb;font-weight:700;font-size:13px;color:#0d47a1;border-bottom:2px solid #1565c0}
.data-table th.cat-header{padding:6px 6px;font-size:12px;letter-spacing:1px;font-weight:700;text-transform:uppercase}
.data-table th{padding:10px 6px;text-align:center;font-weight:600;white-space:nowrap;font-size:12px;cursor:pointer;user-select:none;position:relative;transition:background .15s}
.data-table th:hover{background:#283593}
.data-table th:first-child,.data-table td:first-child{position:sticky;left:0;z-index:2;min-width:70px}
.data-table th:first-child{z-index:4}
.data-table td:first-child{background:#fff}
.data-table tbody tr:hover td:first-child{background:#f5f7ff}
.data-table tbody tr.selected td:first-child{background:var(--primary-light)}
.data-table .avg-row td:first-child{background:#bbdefb;color:#0d47a1}
.data-table th:first-child::after,.data-table td:first-child::after{content:'';position:absolute;top:0;right:-6px;bottom:0;width:6px;pointer-events:none;background:linear-gradient(to right,rgba(0,0,0,.08),transparent)}
.data-table th.no-sort{cursor:default}
.data-table th.no-sort:hover{background:#1a237e}
.data-table th .sort-icon{font-size:10px;margin-left:2px;opacity:.5}
.data-table th .sort-icon.asc{opacity:1}
.data-table th .sort-icon.desc{opacity:1}
.data-table td{padding:7px 6px;text-align:center;border-bottom:1px solid #f0f0f0}
.data-table tbody tr{cursor:pointer;transition:background .15s}
.data-table tbody tr:hover{background:#f5f7ff}
.data-table tbody tr.selected{background:var(--primary-light)}
.data-table .city-col{text-align:left;font-weight:600;white-space:nowrap;min-width:70px}
.data-table .avg-row{background:#bbdefb;font-weight:700;cursor:default}
.data-table .avg-row:hover{background:#bbdefb}
.cell-good{color:var(--success);font-weight:600}
.cell-bad{color:var(--danger);font-weight:700}
.cell-warn{color:#e37400;font-weight:600}
.label-cell{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-start}
.text-col{text-align:left!important;min-width:160px;max-width:260px;font-size:12px;line-height:1.5;vertical-align:top}
.issue-line{display:flex;align-items:flex-start;gap:4px;padding:2px 0;color:var(--text)}
.issue-dot{flex-shrink:0;width:5px;height:5px;border-radius:50%;background:var(--danger);margin-top:6px}
.suggest-line{display:flex;align-items:flex-start;gap:4px;padding:2px 0;color:var(--primary)}
.suggest-arrow{flex-shrink:0;font-size:12px;margin-top:1px}
.no-issue{color:var(--border)}
.detail{display:none}
.detail.show{display:block}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.detail-header h2{font-size:22px;font-weight:700}
.detail-header .store-count{font-size:13px;color:var(--text2)}
.detail-labels{display:flex;gap:6px;flex-wrap:wrap}
.detail-labels .badge{font-size:12px;padding:3px 10px;line-height:22px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.metric-card.good::before{background:var(--success)}
.metric-card.bad::before{background:var(--danger)}
.metric-card.warn::before{background:var(--warning)}
.metric-card.neutral::before{background:var(--border)}
.metric-card .mc-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-card .mc-value{font-size:24px;font-weight:700}
.metric-card .mc-sub{font-size:11px;color:var(--text2);margin-top:2px}
.metric-card .mc-bench{font-size:11px;margin-top:4px}
.mc-bench.above{color:var(--success)}
.mc-bench.below{color:var(--danger)}
.section{background:var(--card);border-radius:10px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.section h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section h3 .icon{font-size:18px}
.issue-item{padding:8px 0;border-bottom:1px solid #f5f5f5;display:flex;gap:8px;align-items:flex-start}
.issue-item:last-child{border-bottom:none}
.issue-icon{flex-shrink:0;width:20px;text-align:center;margin-top:2px}
.issue-text{font-size:13px;line-height:1.5}
.issue-text.suggest{color:var(--primary)}
.issue-text.problem{color:var(--text)}
.store-chips{display:flex;flex-wrap:wrap;gap:6px}
.store-chip{background:#f0f2f5;padding:4px 10px;border-radius:6px;font-size:12px;color:var(--text2)}
.funnel{display:flex;align-items:center;gap:0;margin:12px 0;flex-wrap:wrap}
.funnel-step{text-align:center;padding:8px 16px;background:var(--primary-light);border-radius:8px;min-width:90px}
.funnel-step .fs-label{font-size:11px;color:var(--text2)}
.funnel-step .fs-value{font-size:18px;font-weight:700;color:var(--primary)}
.funnel-arrow{font-size:20px;color:var(--border);margin:0 4px;flex-shrink:0}
.compare-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.compare-bar .cb-label{width:90px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.compare-bar .cb-track{flex:1;height:20px;background:#f0f2f5;border-radius:4px;position:relative;overflow:hidden;max-width:300px}
.compare-bar .cb-fill{height:100%;border-radius:4px;transition:width .5s}
.compare-bar .cb-val{font-size:12px;font-weight:600;width:50px;flex-shrink:0}
.compare-bar .cb-avg{position:absolute;top:0;height:100%;width:2px;background:var(--danger);z-index:1}
@media(max-width:900px){
  .sidebar{display:none}
  .layout{flex-direction:column}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.lock-overlay{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1a237e,#1565c0);display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.lock-overlay.unlocked{opacity:0;pointer-events:none}
.lock-box{background:#fff;border-radius:16px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:360px;width:90%}
.lock-box h2{font-size:18px;color:#1a237e;margin-bottom:6px}
.lock-box p{font-size:13px;color:#5f6368;margin-bottom:20px}
.lock-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;text-align:center;outline:none;transition:border .2s;letter-spacing:2px}
.lock-input:focus{border-color:#1a73e8}
.lock-btn{margin-top:16px;width:100%;padding:12px;border:none;border-radius:10px;background:#1a73e8;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.lock-btn:hover{background:#1557b0}
.lock-error{color:#ea4335;font-size:12px;margin-top:10px;min-height:18px}
#app{display:none}
#app.show{display:block}
.multi-select .ms-dropdown{max-height:250px;overflow-y:auto}.multi-select label:hover{background:#f5f5f5}.multi-select input[type=checkbox]{accent-color:var(--primary);width:14px;height:14px}
</style>
</head>

<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <h2>M馆城市问题诊断看板</h2>
    <p>请输入访问密码</p>
    <input type="password" class="lock-input" id="lockInput" placeholder="密码" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="lock-btn" onclick="checkPwd()">进入看板</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>
<div id="app">
<div class="topbar">

        <select id="storeFilterMgr" onchange="renderStores()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>
        <label style="font-size:13px;color:#5f6368;margin-left:8px">标签：</label>
        <select id="storeFilterLabel" onchange="renderStores()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;min-width:120px"></select>
      </div>
      <div id="storeTableArea"></div>
    </div>
    <div id="detailPanel" class="detail"><div id="dtlFilterBar" style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;align-items:center"></div><div id="dtlContent"></div></div>

  </div>
</div>

function buildFilteredData(filter) {
  const stores = filterStores(filter);
  const nat = aggStores(stores);
  function computeLabels(obj) {
    const L = [];

    if(obj['消课转化率']<nat['消课转化率']) L.push('消课转化率↓');
    return L;
  }

  const cityMap = {};
  stores.forEach(s => { (cityMap[s.city] = cityMap[s.city]||[]).push(s); });

    const a = aggStores(grp);
    a.city = city; a.stores = grp.map(s=>s.name);
    a.labels = computeLabels(a);
    a.label_count = a.labels.length;
    return a;

  const mgrMap = {};
  stores.forEach(s => { (mgrMap[s.mgr] = mgrMap[s.mgr]||[]).push(s); });
  const managers = Object.entries(mgrMap).map(([mgr, grp]) => {
    const a = aggStores(grp);
    a.manager = mgr; a.stores = grp.map(s=>s.name);
    a.cities = [...new Set(grp.map(s=>s.city))];
    a.labels = computeLabels(a); a.label_count = a.labels.length;
    return a;
  }).sort((a,b) => b.净销售额 - a.净销售额);
  // Store-level
  const storeRows = stores.map(s => {
    const row = {
    store: s.name, city: s.city, manager: s.mgr, type: s.type, status: s.status,
    业绩目标:s.pt, 净销售额:s.ns,
    业绩完成率:s.pt?Math.round(s.ns/s.pt*1000)/10:0,
    拉新完成率:s.lx_pt?Math.round(s.lx_ns/s.lx_pt*1000)/10:0,
    复购完成率:s.fg_pt?Math.round(s.fg_ns/s.fg_pt*1000)/10:0,
    退款率:(s.refund+s.ns)>0?Math.round(s.refund/(s.refund+s.ns)*1000)/10:0,
    复购率:s.expire_30?Math.round(s.rebuy_30/s.expire_30*1000)/10:0,
    店均净收入:Math.round(s.ns), 复购店均净收入:s.fg_ns>0?Math.round(s.fg_ns):0,
    拉新店均净收入:s.lx_ns>0?Math.round(s.lx_ns):0,
    店均拉新:s.lx_users, 拉新客单价:s.lx_users?Math.round(s.lx_gmv/s.lx_users):0,
    复购客单价:s.fg_users?Math.round(s.fg_gmv/s.fg_users):null,
    体验课订单数:s.exp_orders, 店均体验课:s.exp_orders,
    派单率:s.exp_orders?Math.round(s.exp_dispatch/s.exp_orders*1000)/10:0,
    上课率:s.exp_dispatch?Math.round(s.exp_class/s.exp_dispatch*1000)/10:0,
    转化率:s.exp_class?Math.round(s.exp_convert/s.exp_class*1000)/10:0,
    体验课下单转化率:s.exp_orders?Math.round(s.exp_convert/s.exp_orders*1000)/10:0,
    消课转化率:s.exp_class?Math.round(s.exp_convert/s.exp_class*1000)/10:0,
    教练比:s.coach_ratio, 人力成本占比:s.hr_cost,
    包月正式用户数:s.monthly_users, 私教复购支付用户数:s.fg_users,
    私教复购GMV:s.fg_gmv, 到期用户数:s.expire_30, 已复购数:s.rebuy_30,
    复购目标占比:s.pt?Math.round(s.fg_pt/s.pt*1000)/10:0,
    拉新净销售额:s.lx_ns, 拉新目标:s.lx_pt,
    复购净销售额:s.fg_ns, 复购目标:s.fg_pt,
    拉新用户数:s.lx_users, 私教拉新GMV:s.lx_gmv,
    "包月私教0-30天到期用户数":s.expire_30, "包月私教0-30天到期用户复购数":s.rebuy_30,
    私教体验课订单数:s.exp_orders, 私教体验课派单数:s.exp_dispatch,
    私教体验课上课数:s.exp_class, 私教体验课转化数:s.exp_convert,
    盘点率_30:s.pd_expire_30?Math.round((s.pd_counted_30||0)/s.pd_expire_30*1000)/10:0,
    盘点金额_30:s.pd_amount_30||0,
    预估复购率_30:s.pd_expire_30?Math.round((s.pd_will_rebuy_30||0)/s.pd_expire_30*1000)/10:0,
    咬合度_30:s.fg_pt?Math.round((s.pd_amount_30||0)/s.fg_pt*1000)/10:0,
    盘点率_90:s.pd_expire_90?Math.round((s.pd_counted_90||0)/s.pd_expire_90*1000)/10:0,
    盘点金额_90:s.pd_amount_90||0,
    预估复购率_90:s.pd_expire_90?Math.round((s.pd_will_rebuy_90||0)/s.pd_expire_90*1000)/10:0,
    咬合度_90:s.fg_pt?Math.round((s.pd_amount_90||0)/s.fg_pt*1000)/10:0,
    lx_new:s.lx_new||0, lx_new_rebuy:s.lx_new_rebuy||0,
    "当月拉新用户数":s.lx_new||0, "当月拉新复购率":s.lx_new?Math.round((s.lx_new_rebuy||0)/s.lx_new*1000)/10:0,
  };
    row.labels = computeLabels(row);
    row.label_count = row.labels.length;
    return row;
  });
  return {national: nat, cities, managers, stores: storeRows, total_stores: stores.length};
}

function buildFilterBar(containerId, filter, onTypeChange, onStatusChange) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (el.dataset.fbInit === 'true') {
    // Already initialized — just sync checkbox states & display text (do NOT rebuild DOM)
    [containerId+'_type', containerId+'_status'].forEach(gid => {
      const ms = document.getElementById(gid);
      if (!ms) return;
      const isType = gid.endsWith('_type');
      const items = isType ? ALL_TYPES : ALL_STATUSES;
      const selected = isType ? filter.types : filter.statuses;
      const allSel = items.every(i => selected.has(i));
      ms.querySelectorAll('input[name=item]').forEach(cb => { cb.checked = selected.has(cb.value); });
      ms.querySelectorAll('input[name=all]').forEach(cb => { cb.checked = allSel; });
      const b = ms.querySelector(':scope > div:first-child b');
      if (b) b.textContent = allSel ? '全部' : selected.size+'项';
    });
    return;
  }
  el.dataset.fbInit = 'true';
  function renderGroup(id, label, allItems, selected) {
    const allSel = allItems.every(i => selected.has(i));
    const count = selected.size;
    let h = '<div style="position:relative;display:inline-block" class="multi-select" id="'+id+'">';
    h += '<div style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;min-width:100px;user-select:none">';
    h += '<span style="color:#5f6368">'+label+'：</span>';
    h += allSel ? '<b>全部</b>' : '<b>'+count+'项</b>';
    h += ' <span style="font-size:10px;color:#999">▼</span></div>';
    h += '<div class="ms-dropdown" style="display:none;position:absolute;top:100%;left:0;z-index:100;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);min-width:160px;padding:6px 0;margin-top:4px">';
    h += '<label style="display:flex;align-items:center;padding:4px 12px;cursor:pointer;font-size:13px;gap:6px"><input type="checkbox" name="all" '+(allSel?'checked':'')+' onchange="var p=this.closest(\'.multi-select\');p.querySelectorAll(\'input[name=item]\').forEach(c=>c.checked=this.checked);p.dispatchEvent(new Event(\'fc\'))">全选</label>';
    h += '<div style="height:1px;background:#e0e0e0;margin:4px 0"></div>';
    allItems.forEach(item => {
      h += '<label style="display:flex;align-items:center;padding:4px 12px;cursor:pointer;font-size:13px;gap:6px"><input type="checkbox" name="item" '+(selected.has(item)?'checked':'')+' value="'+item+'" onchange="this.closest(\'.multi-select\').dispatchEvent(new Event(\'fc\'))">'+item+'</label>';
    });
    h += '</div></div>';
    return h;
  }
  el.innerHTML = renderGroup(containerId+'_type','FM门店类型',ALL_TYPES,filter.types) + ' ' + renderGroup(containerId+'_status','营业状态',ALL_STATUSES,filter.statuses);
  // Add toggle + change handlers (attached once, persist across renders)
  el.querySelectorAll('.multi-select').forEach(ms => {
    ms.querySelector(':scope > div:first-child').onclick = (e) => {
      e.stopPropagation();
      el.querySelectorAll('.multi-select').forEach(o => { if(o!==ms){ o.classList.remove('open'); o.querySelectorAll('.ms-dropdown').forEach(d=>d.style.display='none'); }});
      ms.classList.toggle('open');
      ms.querySelectorAll('.ms-dropdown').forEach(d => d.style.display = ms.classList.contains('open') ? 'block' : 'none');
    };
    ms.addEventListener('fc', () => {
      const id = ms.id;
      const isType = id.endsWith('_type');
      const boxes = ms.querySelectorAll('input[name=item]');
      const newSet = new Set();
      boxes.forEach(b => { if(b.checked) newSet.add(b.value); });
      // Update "全选" checkbox state
      ms.querySelectorAll('input[name=all]').forEach(cb => { cb.checked = newSet.size === (isType?ALL_TYPES:ALL_STATUSES).length; });
      // Update display text
      const b = ms.querySelector(':scope > div:first-child b');
      if (b) b.textContent = newSet.size === (isType?ALL_TYPES:ALL_STATUSES).length ? '全部' : newSet.size+'项';
      if (isType) { filter.types = newSet; onTypeChange(); }
      else { filter.statuses = newSet; onStatusChange(); }
    });
  });
  // Close on outside click
  document.addEventListener('click', e => {
    if (!el.contains(e.target)) el.querySelectorAll('.multi-select').forEach(ms => { ms.classList.remove('open'); ms.querySelectorAll('.ms-dropdown').forEach(d => d.style.display='none'); });
  });
}

const collapsedCats = {ov:new Set(), mgr:new Set(), store:new Set()};
function toggleCat(tabId, catName) {
  const s = collapsedCats[tabId];
  s.has(catName) ? s.delete(catName) : s.add(catName);
  const table = document.querySelector('#'+(tabId==='ov'?'ovContent':tabId==='mgr'?'mgrContent':'storeTableArea')+' table');
  if(!table) return;
  const isHidden = s.has(catName);
  // Find category header and column range
  let catStart = -1, catSpan = 0;
  table.querySelectorAll('thead tr:first-child th').forEach(th => {
    if(th.dataset.cat===catName) {
      catStart = parseInt(th.dataset.catstart);
      catSpan = parseInt(th.dataset.catspan);
      // Update colspan: 1 when collapsed (keep 1st col as placeholder), original when expanded
      th.colSpan = isHidden ? 1 : catSpan;
      const arrow = th.querySelector('.cat-arrow');
      if(arrow) arrow.textContent = isHidden ? '▶' : '▼';
    }
  });
  if(catStart < 0) return;
  // Toggle column visibility: when collapsed, keep 1st col visible, hide rest
  // When expanded, show all cols
  table.querySelectorAll('tr').forEach(tr => {
    const cells = tr.children;
    for(let i = catStart + 1; i < catStart + catSpan; i++) {
      if(cells[i]) cells[i].style.display = isHidden ? 'none' : '';
    }
  });
}

function buildTable(items, cols, categories, sk, sd, toggleFn, totalStores, getValFn, tabId) {
  function sortIcon(key,sortable){
    if(sortable===false)return'';
    if(sk===key)return sd==='asc'?'<span class="sort-icon asc">▲</span>':'<span class="sort-icon desc">▼</span>';
    return'<span class="sort-icon">⇅</span>';
  }
  let sorted=[...items];
  if(sk){
    sorted.sort((a,b)=>{
      let va=getValFn(a,sk),vb=getValFn(b,sk);
      if(typeof va==='string')return sd==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      if(va==null)va=-Infinity; if(vb==null)vb=-Infinity;
      return sd==='asc'?(va-vb):(vb-va);
    });
  }
  // Build column→category mapping
  const colCatIdx = [];
  let colIdx = 0;
  const catInfo = []; // {name, startIdx, span, hasLabel}
  categories.forEach(cat => {
    const info = {name:cat.label||'', startIdx:colIdx, span:cat.span, hasLabel:!!cat.label, color:cat.color||''};
    catInfo.push(info);
    for(let i=0;i<cat.span;i++) colCatIdx.push(info);
    colIdx += cat.span;
  });
  const collapsed = (tabId && collapsedCats[tabId]) ? collapsedCats[tabId] : new Set();
  let html='<div class="table-wrap"><table class="data-table"><thead><tr>';
  catInfo.forEach(ci => {
    const isCollapsed = collapsed.has(ci.name);
    if(ci.hasLabel){
      html+=`<th colspan="${isCollapsed ? 1 : ci.span}" class="cat-header" data-cat="${ci.name}" data-catstart="${ci.startIdx}" data-catspan="${ci.span}" onclick="toggleCat('${tabId}','${ci.name}')" style="background:${ci.color};border-bottom:1px solid rgba(255,255,255,.2);font-size:13px;letter-spacing:1px;text-align:center;cursor:pointer;user-select:none"><span class="cat-arrow" style="font-size:10px;margin-right:4px">${isCollapsed?'▶':'▼'}</span>${ci.name}</th>`;
    }else{
      html+=`<th colspan="${ci.span}" class="no-sort" style="background:#1a237e"></th>`;
    }
  });
  html+='</tr><tr>';
  cols.forEach((col,i)=>{
    const ci = colCatIdx[i];
    const isCollapsed = ci && collapsed.has(ci.name) && i !== ci.startIdx;
    const hideStyle = isCollapsed ? ' style="display:none"' : '';
    const catAttr = ci ? ` data-cat="${ci.name}"` : '';
    const icon=sortIcon(col.key,col.sortable);
    const cls=col.sortable===false?' class="no-sort"':'';
    const onclick=col.sortable!==false?` onclick="${toggleFn}('${col.key}')"`:''
    html+=`<th${cls}${onclick}${catAttr}${hideStyle}>${col.label}${icon}</th>`;
  });
  // Avg row in thead (sticky)
  html+='</tr><tr class="avg-row">';
  const firstCatInfo = colCatIdx[0];
  const firstHidden = firstCatInfo && collapsed.has(firstCatInfo.name);
  html+=`<td class="city-col" style="position:sticky;left:0;z-index:5;background:#bbdefb;font-weight:700;color:#0d47a1;min-width:70px;border-bottom:2px solid #1565c0${firstHidden?';display:none':''}">全国均值</td>`;
  cols.slice(1).forEach((col,i)=>{
    const ci = colCatIdx[i+1];
    const isCollapsed = ci && collapsed.has(ci.name) && (i+1) !== ci.startIdx;
    const hideStyle = isCollapsed ? ' style="display:none"' : '';
    if(['labels','cities','store','manager','city'].includes(col.key)){html+=`<td${hideStyle}></td>`;return;}
    if(col.key==='store_count'){html+=`<td${hideStyle}>${totalStores}</td>`;return;}
    if(col.key==='复购客单价'){html+=`<td${hideStyle}>${nat.复购客单价!=null?'¥'+nat.复购客单价:'-'}</td>`;return;}
    if(col.key==='盘点金额_30'){html+=`<td${hideStyle}>${(nat.盘点金额_30/10000).toFixed(1)}万</td>`;return;}
    if(col.key==='盘点金额_90'){html+=`<td${hideStyle}>${(nat.盘点金额_90/10000).toFixed(1)}万</td>`;return;}
    const natMap={'业绩完成率':nat.业绩完成率,'拉新完成率':nat.拉新完成率,'复购完成率':nat.复购完成率,'退款率':nat.退款率,'店均拉新':nat.店均拉新,'复购率':nat.复购率,'上课率':nat.上课率,'体验课下单转化率':nat.体验课下单转化率,'消课转化率':nat.消课转化率,'拉新客单价':nat.拉新客单价,'人力成本占比':nat.人力成本占比,'教练比':nat.教练比,'店均净收入':nat.店均净收入,'复购店均净收入':nat.复购店均净收入,'拉新店均净收入':nat.拉新店均净收入,'盘点率_30':nat.盘点率_30,'预估复购率_30':nat.预估复购率_30,'咬合度_30':nat.咬合度_30,'盘点率_90':nat.盘点率_90,'预估复购率_90':nat.预估复购率_90,'咬合度_90':nat.咬合度_90,'复购目标占比':nat.复购目标占比,'当月拉新用户数':nat.当月拉新用户数,'当月拉新复购率':nat.当月拉新复购率,'店均体验课':nat.店均体验课};
    if(natMap[col.key]!==undefined){html+=`<td${hideStyle}>${(col.prefix||'')+natMap[col.key]+(col.suffix||'')}</td>`;return;}
    const vals=items.map(c=>c[col.key]).filter(v=>typeof v==='number');
    const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—';
    html+=`<td${hideStyle}>${(col.prefix||'')+avg+(col.suffix||'')}</td>`;
  });
  html+='</tr></thead><tbody>';
  sorted.forEach(item=>{
    html+=`<tr>`;
    cols.forEach((col,i)=>{
      const ci = colCatIdx[i];
      const isCollapsed = ci && collapsed.has(ci.name) && i !== ci.startIdx;
      const hideStyle = isCollapsed ? ' style="display:none"' : '';
      if(col.render){
        const cls=(col.key==='city'||col.key==='manager'||col.key==='store')?'city-col':(col.key==='labels'?'text-col':'');
        html+=`<td class="${cls}"${hideStyle}>${col.render(item)}</td>`;
        return;
      }
      const v=item[col.key];
      let cls='';
      if(v==null){html+=`<td${hideStyle}><span style="color:#999">-</span></td>`;return;}
      if(col.bench!==undefined){
        if(col.isCost){cls=v>col.bench?'cell-warn':'cell-good';}
        else if(col.lower){cls=v>=col.bench?'cell-good':v<col.bench*0.7?'cell-bad':'cell-warn';}
        else{cls=v<=col.bench?'cell-good':v>col.bench+10?'cell-bad':'cell-warn';}
      }
      const display=(col.prefix||'')+v+(col.suffix||'');
      html+=`<td class="${cls}"${hideStyle}>${display}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

let storeFiltersInited = false;
function initStoreFilters(){
  if(storeFiltersInited)return;
  storeFiltersInited=true;
  const data = buildFilteredData(storeFilter);
  const cs=['全部',...data.cities.map(c=>c.city)];
  const ms=['全部',...data.managers.map(m=>m.manager)];
  const ls=['全部','综合偏低','退款异常','退款偏高','拉新瓶颈','拉新偏弱','复购乏力','体验课转化弱','体验课到课低','人力成本偏高','表现良好','需持续关注'];

  document.getElementById('storeFilterMgr').innerHTML=ms.map(m=>'<option>'+m+'</option>').join('');
  document.getElementById('storeFilterLabel').innerHTML=ls.map(l=>'<option>'+l+'</option>').join('');
}

function renderStores(){
  const data = buildFilteredData(storeFilter);
  nat = data.national;
  buildFilterBar('storeFilterBar', storeFilter, renderStores, renderStores);
  nat = data.national;
  // Refresh city/manager/label options based on current filter
  const cs=['全部',...data.cities.map(c=>c.city)];
  const ms=['全部',...data.managers.map(m=>m.manager)];
  const prevCity=document.getElementById('storeFilterCity').value;
  const prevMgr=document.getElementById('storeFilterMgr').value;
  document.getElementById('storeFilterCity').innerHTML=cs.map(c=>'<option'+(c===prevCity?' selected':'')+'>'+c+'</option>').join('');
  document.getElementById('storeFilterMgr').innerHTML=ms.map(m=>'<option'+(m===prevMgr?' selected':'')+'>'+m+'</option>').join('');
  const fc=document.getElementById('storeFilterCity').value;
  const fm=document.getElementById('storeFilterMgr').value;
  const fl=document.getElementById('storeFilterLabel').value;
  let filtered=data.stores.filter(s=>{
    if(fc!=='全部'&&s.city!==fc)return false;
    if(fm!=='全部'&&s.manager!==fm)return false;
    if(fl!=='全部'&&!s.labels.includes(fl))return false;
    return true;
  });
  const tableArea=document.getElementById('storeTableArea');
  const info='<div style="font-size:13px;color:#5f6368;margin-bottom:8px">共 '+filtered.length+' 家门店'+(fc!=='全部'?' | '+fc:'')+(fm!=='全部'?' | 区经:'+fm:'')+(fl!=='全部'?' | 标签:'+fl:'')+'</div>';
  tableArea.innerHTML=info+buildTable(filtered,storeCols,storeCats,storeSortKey,storeSortDir,'toggleStoreSort',data.total_stores,gv,'store');
  document.getElementById('storesPanel').className='fade-in';
}

function renderDetail(name){
  const data = buildFilteredData(dtlFilter);
  const localNat = data.national;
  const c = data.cities.find(x=>x.city===name);
  if(!c)return;
  const panel=document.getElementById('detailPanel');
  buildFilterBar('dtlFilterBar', dtlFilter, ()=>renderDetail(name), ()=>renderDetail(name));
  function ms(val,bench,lower){
    if(bench===undefined)return 'neutral';
    if(lower)return val>=bench?'good':val<bench*0.7?'bad':'warn';
    return val<=bench?'good':val>bench+10?'bad':'warn';
  }
  function bt(val,bench,lower){
    if(bench===undefined)return'';
    if(lower)return val>=bench?`<span class="mc-bench above">高于均值 ${bench}%</span>`:`<span class="mc-bench below">低于均值 ${bench}%</span>`;
    return val<=bench?`<span class="mc-bench above">低于均值 ${bench}%</span>`:`<span class="mc-bench below">高于均值 ${bench}%</span>`;
  }
  const metrics=[
    {label:'业绩完成率',value:c.业绩完成率+'%',status:ms(c.业绩完成率,localNat.业绩完成率,true),bench:bt(c.业绩完成率,localNat.业绩完成率,true),sub:`目标${(c.业绩目标/10000).toFixed(0)}万 / 实际${(c.净销售额/10000).toFixed(1)}万`},
    {label:'店均净收入',value:'¥'+c.店均净收入,status:ms(c.店均净收入,localNat.店均净收入,true),bench:bt(c.店均净收入,localNat.店均净收入,true).replace('%','元'),sub:`${c.store_count}家门店`},
    {label:'拉新完成率',value:c.拉新完成率+'%',status:ms(c.拉新完成率,localNat.拉新完成率,true),bench:bt(c.拉新完成率,localNat.拉新完成率,true),sub:`目标${(c.拉新目标/10000).toFixed(0)}万 / 实际${(c.拉新净销售额/10000).toFixed(1)}万`},
    {label:'拉新店均净收入',value:'¥'+c.拉新店均净收入,status:'neutral',bench:''},
    {label:'复购完成率',value:c.复购完成率+'%',status:ms(c.复购完成率,localNat.复购完成率,true),bench:bt(c.复购完成率,localNat.复购完成率,true),sub:`目标${(c.复购目标/10000).toFixed(0)}万 / 实际${(c.复购净销售额/10000).toFixed(1)}万`},
    {label:'复购店均净收入',value:'¥'+c.复购店均净收入,status:'neutral',bench:''},
    {label:'退款率',value:c.退款率+'%',status:ms(c.退款率,localNat.退款率,false),bench:bt(c.退款率,localNat.退款率,false),sub:'退款GMV/(退款GMV+净收入)'},
    {label:'店均拉新用户',value:c.店均拉新+'人',status:ms(c.店均拉新,localNat.店均拉新,true),bench:bt(c.店均拉新,localNat.店均拉新,true).replace('%','人'),sub:`共${c.拉新用户数}个拉新用户`},
    {label:'0-30天复购率',value:c.复购率+'%',status:ms(c.复购率,localNat.复购率,true),bench:bt(c.复购率,localNat.复购率,true),sub:`到期${c.到期用户数}人 / 复购${c.已复购数}人`},
    {label:'体验课派单率',value:c.派单率+'%',status:'neutral',bench:'',sub:`${c.体验课订单数}单`},
    {label:'体验课上课率',value:c.上课率+'%',status:ms(c.上课率,localNat.上课率,true),bench:bt(c.上课率,localNat.上课率,true)},
    {label:'体验课下单转化率',value:c.体验课下单转化率+'%',status:ms(c.体验课下单转化率,localNat.体验课下单转化率,true),bench:bt(c.体验课下单转化率,localNat.体验课下单转化率,true)},
    {label:'消课转化率',value:c.消课转化率+'%',status:ms(c.消课转化率,localNat.消课转化率,true),bench:bt(c.消课转化率,localNat.消课转化率,true)},
    {label:'包月用户教练比',value:c.教练比,status:'neutral',bench:'',sub:`${c.包月正式用户数}正式用户`},
    {label:'人力成本占比',value:c.人力成本占比+'%',status:c.人力成本占比>localNat.人力成本占比?'bad':'neutral',bench:c.人力成本占比>localNat.人力成本占比?'<span class="mc-bench below">高于全国均值'+localNat.人力成本占比+'%</span>':''},
    {label:'拉新客单价',value:'¥'+c.拉新客单价,status:c.拉新客单价>=localNat.拉新客单价?'good':'neutral',bench:'',sub:`私教拉新GMV/拉新用户`},
    {label:'复购客单价',value:c.复购客单价!=null?'¥'+c.复购客单价:'-',status:c.复购客单价!=null?(c.复购客单价>=localNat.复购客单价?'good':'bad'):'neutral',bench:'',sub:`${c.私教复购支付用户数||0}个复购支付用户`},
  ];
  const maxRate=25;
  function compareBar(label,val,benchVal,invert){
    const pct=Math.min(Math.abs(val)/maxRate*100,100);
    const benchPct=Math.min(Math.abs(benchVal)/maxRate*100,100);
    const color=invert?(val<=benchVal?'var(--success)':val>benchVal+10?'var(--danger)':'var(--warning)'):
                       (val>=benchVal?'var(--success)':val<benchVal*0.7?'var(--danger)':'var(--warning)');
    return`<div class="compare-bar">
      <span class="cb-label">${label}</span>
      <div class="cb-track"><div class="cb-fill" style="width:${pct}%;background:${color}"></div><div class="cb-avg" style="left:${benchPct}%" title="均值 ${benchVal}%"></div></div>
      <span class="cb-val" style="color:${color}">${val}%</span>
    </div>`;
  }
  let html=`
    <div class="detail-header fade-in">
      <h2>${c.city}</h2><span class="store-count">${c.store_count}家门店</span>
      <div class="detail-labels">${c.labels.map(l=>`<span class="${getBadgeClass(l)}">${l}</span>`).join('')}</div>
    </div>
    <div class="metrics-grid fade-in">
      ${metrics.map(m=>`<div class="metric-card ${m.status}"><div class="mc-label">${m.label}</div><div class="mc-value">${m.value}</div>${m.sub?`<div class="mc-sub">${m.sub}</div>`:''} ${m.bench||''}</div>`).join('')}
    </div>
    <div class="section fade-in">
      <h3><span class="icon">📊</span> 与全国均值对比</h3>
      ${compareBar('业绩完成率',c.业绩完成率,localNat.业绩完成率,false)}
      ${compareBar('拉新完成率',c.拉新完成率,localNat.拉新完成率,false)}
      ${compareBar('复购完成率',c.复购完成率,localNat.复购完成率,false)}
      ${compareBar('退款率',c.退款率,localNat.退款率,true)}
      ${compareBar('复购率',c.复购率,localNat.复购率,false)}
      ${compareBar('上课率',c.上课率,localNat.上课率,false)}
      ${compareBar('转化率',c.转化率,localNat.转化率,false)}
    </div>
    <div class="section fade-in">
      <h3><span class="icon">🔄</span> 体验课漏斗</h3>
      <div class="funnel">
        <div class="funnel-step"><div class="fs-label">订单</div><div class="fs-value">${c.体验课订单数}</div></div>
        <span class="funnel-arrow">→</span>
        <div class="funnel-step"><div class="fs-label">派单率</div><div class="fs-value">${c.派单率}%</div></div>
        <span class="funnel-arrow">→</span>
        <div class="funnel-step"><div class="fs-label">上课率</div><div class="fs-value">${c.上课率}%</div></div>
        <span class="funnel-arrow">→</span>
        <div class="funnel-step"><div class="fs-label">转化率</div><div class="fs-value">${c.转化率}%</div></div>
      </div>
    </div>`;
  html+=`<div class="section fade-in"><h3><span class="icon">🏪</span> 门店列表（${c.stores.length}家）</h3>
    <div class="store-chips">${c.stores.map(s=>`<span class="store-chip">${s}</span>`).join('')}</div></div>`;
  panel.innerHTML=html;
  panel.classList.add('show');
}

function checkPwd(){
  const pwd=document.getElementById('lockInput').value;
  if(pwd==='FM2026'){
    document.getElementById('lockOverlay').classList.add('unlocked');
    document.getElementById('app').classList.add('show');
    setTimeout(()=>document.getElementById('lockOverlay').remove(),500);
    renderOverview();
  }else{
    document.getElementById('lockError').textContent='密码错误，请重试';
    document.getElementById('lockInput').value='';
  }
}

const DQZ_MAP = {
  '天津市':'叶青青','重庆市':'叶青青','北京市':'叶青青','长沙市':'叶青青',
  '武汉市':'叶青青','上海市':'叶青青','苏州市':'叶青青','无锡市':'叶青青','成都市':'叶青青',
  '广州市':'吉博文','杭州市':'吉博文','南京市':'吉博文','深圳市':'吉博文',
  '青岛市':'吉博文','合肥市':'吉博文','西安市':'吉博文','郑州市':'吉博文','宁波市':'吉博文','济南市':'吉博文'
};
let dqzSortKey = '业绩完成率', dqzSortDir = 'desc';
function toggleDqzSort(key){if(dqzSortKey===key){dqzSortDir=dqzSortDir==='asc'?'desc':'asc';}else{dqzSortKey=key;dqzSortDir='desc';}renderDqz();}

function renderDqz(){
  const data = buildFilteredData(dqzFilter);
  nat = data.national;
  buildFilterBar('dqzFilterBar', dqzFilter, renderDqz, renderDqz);
  nat = data.national;

  // Group by 大区总
  const groups = {};
  data.stores.forEach(s => {
    const dqz = DQZ_MAP[s.city];
    if(!dqz) return;
    if(!groups[dqz]) groups[dqz] = [];
    groups[dqz].push(s);
  });

  // Re-aggregate from RAW_STORES for accurate metrics
  const rawFiltered = filterStores(dqzFilter);
  const dqzData = Object.entries(groups).map(([name, stores]) => {
    const rawGroup = rawFiltered.filter(s => DQZ_MAP[s.city] === name);
    const a = aggStores(rawGroup);
    a.dqz = name;
    a.store_count = rawGroup.length;
    a.cities = [...new Set(stores.map(s=>s.city))].sort();
    const dn = data.national;
    a.labels = [];
    if(a['业绩完成率']<dn['业绩完成率']) a.labels.push('业绩完成率↓');
    if(a['复购完成率']<dn['复购完成率']) a.labels.push('复购完成率↓');
    if(a['复购率']<dn['复购率']) a.labels.push('0-30天复购率↓');
    if(a['当月拉新复购率']<dn['当月拉新复购率']) a.labels.push('当月拉新复购率↓');
    if((a['店均体验课']||0)<(dn['店均体验课']||0)) a.labels.push('体验课量↓');
    if(a['上课率']<dn['上课率']) a.labels.push('上课率↓');
    if(a['消课转化率']<dn['消课转化率']) a.labels.push('消课转化率↓');
    return a;
  });

  // Sort
  const getV = (d, k) => {
    if(k==='store_count') return d.store_count;
    if(k==='dqz') return d.dqz;
    return d[k]||0;
  };
  dqzData.sort((a,b) => {
    let va=getV(a,dqzSortKey), vb=getV(b,dqzSortKey);
    if(typeof va==='string') return dqzSortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return dqzSortDir==='asc'?(va-vb):(vb-va);
  });

  // Rank (only 2, higher=better except 退款率)
  function rank(v1,v2,lower){
    if(v1===v2) return '—';
    if(lower) return v1<v2?'🥇':'🥈';
    return v1>v2?'🥇':'🥈';
  }

  const n = data.national;
  function si(key){
    if(dqzSortKey===key) return dqzSortDir==='asc'?'<span class="sort-icon asc">▲</span>':'<span class="sort-icon desc">▼</span>';
    return '<span class="sort-icon">⇅</span>';
  }
  function th(key,label){return '<th onclick="toggleDqzSort(\''+key+'\')" style="cursor:pointer">'+label+si(key)+'</th>';}

  let html = '<div style="background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px">';
  html += '<h3 style="margin:0 0 16px;color:#1a237e;font-size:16px">大区总业绩完成度对比</h3>';

  if(dqzData.length===0){
    html += '<div style="text-align:center;padding:40px;color:#999">当前筛选条件下无匹配的大区总数据</div>';
  } else {
    html += '<div class="table-wrap"><table class="data-table" style="min-width:1800px;font-size:13px">';
    // Category headers
    html += '<thead><tr>';
    html += '<th colspan="4" style="background:#1a237e"></th>';
    html += '<th colspan="3" class="cat-header" style="background:#b71c1c;border-bottom:1px solid rgba(255,255,255,.2)">业绩核心</th>';
    html += '<th colspan="3" class="cat-header" style="background:#004d40;border-bottom:1px solid rgba(255,255,255,.2)">拉新核心</th>';
    html += '<th colspan="3" class="cat-header" style="background:#4a148c;border-bottom:1px solid rgba(255,255,255,.2)">复购核心</th>';
    html += '<th colspan="3" class="cat-header" style="background:#e65100;border-bottom:1px solid rgba(255,255,255,.2)">体验课</th>';
    html += '<th colspan="2" class="cat-header" style="background:#1565c0;border-bottom:1px solid rgba(255,255,255,.2)">运营</th>';
    html += '</tr><tr>';
    html += th('dqz','大区总')+th('store_count','门店数')+'<th>管辖城市</th><th>诊断标签</th>';
    html += th('业绩完成率','业绩完成率')+th('店均净收入','店均净收入')+th('退款率','退款率');
    html += th('拉新完成率','拉新完成率')+th('店均拉新','店均拉新')+th('拉新客单价','拉新客单价');
    html += th('复购率','0-30天复购率')+th('复购店均净收入','复购店均净收入')+th('复购客单价','复购客单价');
    html += th('上课率','上课率')+th('体验课下单转化率','下单转化率')+th('消课转化率','消课转化率');
    html += th('人力成本占比','人力成本%')+th('教练比','教练比');
    html += '</tr>';

    // Avg row
    html += '<tr class="avg-row">';
    html += '<td style="position:sticky;left:0;z-index:5;background:#bbdefb;font-weight:700;color:#0d47a1;border-bottom:2px solid #1565c0">全国均值</td>';
    html += '<td>'+data.total_stores+'</td><td></td><td></td>';
    html += '<td>'+n['业绩完成率']+'%</td><td>¥'+n['店均净收入']+'</td><td>'+n['退款率']+'%</td>';
    html += '<td>'+n['拉新完成率']+'%</td><td>'+n['店均拉新']+'人</td><td>¥'+n['拉新客单价']+'</td>';
    html += '<td>'+n['复购率']+'%</td><td>¥'+n['复购店均净收入']+'</td><td>'+(n['复购客单价']!=null?'¥'+n['复购客单价']:'-')+'</td>';
    html += '<td>'+n['上课率']+'%</td><td>'+n['体验课下单转化率']+'%</td><td>'+n['消课转化率']+'%</td>';
    html += '<td>'+n['人力成本占比']+'%</td><td>'+n['教练比']+'</td>';
    html += '</tr></thead><tbody>';

    // Data rows
    const d0 = dqzData[0], d1 = dqzData[1];
    function cellColor(v, bench, lower, isCost){
      if(v==null||bench==null) return '';
      if(isCost) return v>bench?'cell-warn':'cell-good';
      if(lower) return v>=bench?'cell-good':v<bench*0.7?'cell-bad':'cell-warn';
      return v<=bench?'cell-good':v>bench+10?'cell-bad':'cell-warn';
    }
    dqzData.forEach((d,i) => {
      const other = dqzData[1-i];
      const rCr = rank(d['业绩完成率'],other['业绩完成率'],false);
      const rLx = rank(d['拉新完成率'],other['拉新完成率'],false);
      const rRef = rank(d['退款率'],other['退款率'],true);
      const rFg = rank(d['复购率'],other['复购率'],false);

      html += '<tr>';
      html += '<td class="city-col" style="font-weight:700;font-size:14px;color:#1a237e">'+d.dqz+'</td>';
      html += '<td style="font-weight:600">'+d.store_count+'家</td>';
      html += '<td style="font-size:11px;text-align:left;max-width:200px;white-space:normal;line-height:1.4">'+d.cities.join('、')+'</td>';
      html += '<td style="text-align:left">'+d.labels.map(l=>'<span class="'+getBadgeClass(l)+'" style="font-size:11px">'+l+'</span>').join(' ')+'</td>';

      // 业绩
      html += '<td class="'+cellColor(d['业绩完成率'],n['业绩完成率'],false)+'"><b>'+rCr+' '+d['业绩完成率']+'%</b></td>';
      html += '<td class="'+cellColor(d['店均净收入'],n['店均净收入'],false)+'">¥'+d['店均净收入']+'</td>';
      html += '<td class="'+cellColor(d['退款率'],n['退款率'],false,true)+'">'+rRef+' '+d['退款率']+'%</td>';

      // 拉新
      html += '<td class="'+cellColor(d['拉新完成率'],n['拉新完成率'],false)+'"><b>'+rLx+' '+d['拉新完成率']+'%</b></td>';
      html += '<td class="'+cellColor(d['店均拉新'],n['店均拉新'],false)+'">'+d['店均拉新']+'人</td>';
      html += '<td>¥'+d['拉新客单价']+'</td>';

      // 复购
      html += '<td class="'+cellColor(d['复购率'],n['复购率'],false)+'"><b>'+rFg+' '+d['复购率']+'%</b></td>';
      html += '<td>¥'+d['复购店均净收入']+'</td>';
      html += '<td>'+(d['复购客单价']!=null?'¥'+d['复购客单价']:'-')+'</td>';

      // 体验课
      html += '<td class="'+cellColor(d['上课率'],n['上课率'],false)+'">'+d['上课率']+'%</td>';
      html += '<td class="'+cellColor(d['体验课下单转化率'],n['体验课下单转化率'],false)+'">'+d['体验课下单转化率']+'%</td>';
      html += '<td class="'+cellColor(d['消课转化率'],n['消课转化率'],false)+'">'+d['消课转化率']+'%</td>';

      // 运营
      html += '<td class="'+cellColor(d['人力成本占比'],n['人力成本占比'],false,true)+'">'+d['人力成本占比']+'%</td>';
      html += '<td>'+d['教练比']+'</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
  }
  html += '</div>';

  document.getElementById('dqzContent').innerHTML = html;

var dailyViewMode='city'; // 'city' or 'mgr'

function switchDailyView(mode){
  dailyViewMode=mode;
  var cityBtn=document.getElementById('dailyCityBtn');
  var mgrBtn=document.getElementById('dailyMgrBtn');
  if(cityBtn){
    cityBtn.style.background=mode==='city'?'#3b82f6':'transparent';
    cityBtn.style.color=mode==='city'?'#fff':'#64748b';
    cityBtn.style.boxShadow=mode==='city'?'0 2px 8px rgba(59,130,246,.3)':'none';
  }
  if(mgrBtn){
    mgrBtn.style.background=mode==='mgr'?'#3b82f6':'transparent';
    mgrBtn.style.color=mode==='mgr'?'#fff':'#64748b';
    mgrBtn.style.boxShadow=mode==='mgr'?'0 2px 8px rgba(59,130,246,.3)':'none';
  }
  renderDailyCombined();
}
function toggleDailySort(type,key){
  if(type==='c'){if(dailyCitySort.key===key)dailyCitySort.dir*=-1;else{dailyCitySort.key=key;dailyCitySort.dir=-1;}renderDailyCombined();}
  else{if(dailyMgrSort.key===key)dailyMgrSort.dir*=-1;else{dailyMgrSort.key=key;dailyMgrSort.dir=-1;}renderDailyCombined();}
}

function renderDailyCombined(){
  var dates=Object.keys(HISTORY_PK).sort(function(a,b){return parseInt(a)-parseInt(b);});
  var panel=document.getElementById('dailyContent');
  if(!panel)return;
  if(dates.length<2){panel.innerHTML='<div style="padding:40px;text-align:center;color:#94a3b8"><div style="font-size:48px;margin-bottom:16px">📊</div><div style="font-size:16px">历史数据不足2天，无法对比</div><div style="font-size:13px;margin-top:8px">每天更新看板后会自动积累历史数据</div></div>';return;}
  var d1=dates[dates.length-2],d2=dates[dates.length-1];
  function dateLabel(d){
    var m,dd;
    if(d.length===4){m=parseInt(d.substr(0,2));dd=parseInt(d.substr(2,2));}
    else{m=7;dd=parseInt(d);}
    dd-=1;if(dd<=0){m-=1;dd=30;}
    if(d.length===4)return m+'月'+dd+'日';return dd+'日';
  }
  var label1=dateLabel(d1),label2=dateLabel(d2);

  var h='';
  // Top toggle - large and prominent
  h+='<div style="padding:20px 20px 0 20px">';
  h+='<div style="display:flex;justify-content:center;margin-bottom:16px">';
  h+='<div style="display:inline-flex;background:#f1f5f9;border-radius:12px;padding:4px;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)">';
  h+='<button id="dailyCityBtn" onclick="switchDailyView(\'city\')" style="padding:12px 36px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:'+(dailyViewMode==='city'?'#3b82f6':'transparent')+';color:'+(dailyViewMode==='city'?'#fff':'#64748b')+';box-shadow:'+(dailyViewMode==='city'?'0 2px 8px rgba(59,130,246,.3)':'none')+'">城市</button>';
  h+='<button id="dailyMgrBtn" onclick="switchDailyView(\'mgr\')" style="padding:12px 36px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;background:'+(dailyViewMode==='mgr'?'#3b82f6':'transparent')+';color:'+(dailyViewMode==='mgr'?'#fff':'#64748b')+';box-shadow:'+(dailyViewMode==='mgr'?'0 2px 8px rgba(59,130,246,.3)':'none')+'">区域经理</button>';
  h+='</div></div>';
  // Date subtitle
  h+='<div style="text-align:center;margin-bottom:16px">';
  h+='<div style="font-size:14px;color:#94a3b8;font-weight:500">'+label1+' → '+label2+' 业绩对比</div></div>';

  if(dailyViewMode==='city'){
    h+=renderDailyCityTable(d1,d2,label1,label2);
  }else{
    h+=renderDailyMgrTable(d1,d2,label1,label2);
  }
  h+='</div>';
  panel.innerHTML=h;
}

function renderDailyCityTable(d1,d2,label1,label2){
  var data1=HISTORY_PK[d1]['c'],data2=HISTORY_PK[d2]['c'];
  var allNames={};for(var k in data1)allNames[k]=1;for(var k in data2)allNames[k]=1;
  var allCities=Object.keys(allNames).sort();

  var rows=[],totalPt1=0,totalPt2=0,totalNs1=0,totalNs2=0,totalCnt=0;
  for(var name in allNames){
    if(dailyCityFilter&&name!==dailyCityFilter)continue;
    var v1=data1[name]||[0,0,0],v2=data2[name]||[0,0,0];
    var cr1=v1[0]>0?v1[1]/v1[0]*100:0,cr2=v2[0]>0?v2[1]/v2[0]*100:0;
    var nsDiff=v2[1]-v1[1],crDiff=cr2-cr1;
    rows.push({name:name,count:v2[2],pt1:v1[0],cr1:cr1,pt2:v2[0],cr2:cr2,crDiff:crDiff,ns1:v1[1],ns2:v2[1],nsDiff:nsDiff});
    totalPt1+=v1[0];totalPt2+=v2[0];totalNs1+=v1[1];totalNs2+=v2[1];totalCnt+=v2[2];
  }
  var sk=dailyCitySort.key,sd=dailyCitySort.dir;
  rows.sort(function(a,b){var va=a[sk],vb=b[sk];if(typeof va==='string')return sd*va.localeCompare(vb);return sd*(va-vb);});

  var totalCr1=totalPt1>0?totalNs1/totalPt1*100:0,totalCr2=totalPt2>0?totalNs2/totalPt2*100:0;
  var totalNsDiff=totalNs2-totalNs1,totalCrDiff=totalCr2-totalCr1;
  var h='';

  // City filter
  h+='<div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center">';
  h+='<select onchange="dailyCityFilter=this.value;renderDailyCombined()" style="padding:8px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;background:#fff;color:#334155;min-width:120px">';
  h+='<option value="">全部城市</option>';
  for(var i=0;i<allCities.length;i++){
    h+='<option value="'+allCities[i]+'"'+(dailyCityFilter===allCities[i]?' selected':'')+'>'+allCities[i]+'</option>';
  }
  h+='</select></div>';

  // Table
  var cols=[{key:'name',label:'城市',w:'100px'},{key:'count',label:'门店',w:'55px'},
    {key:'pt2',label:'目标(万)',w:'95px'},{key:'cr1',label:label1+'完成率',w:'100px'},
    {key:'cr2',label:label2+'完成率',w:'100px'},{key:'crDiff',label:'完成率变化',w:'100px'},

function renderDailyMgrTable(d1,d2,label1,label2){
  var data1=HISTORY_PK[d1]['m'],data2=HISTORY_PK[d2]['m'];
  var allNames={};for(var k in data1)allNames[k]=1;for(var k in data2)allNames[k]=1;

  // Build mgr-city mapping from RAW_STORES
  var mgrCities={},cityMgrMap={};
  if(typeof RAW_STORES!=='undefined'){
    for(var i=0;i<RAW_STORES.length;i++){var s=RAW_STORES[i];
      if(s.type!=='FM私教馆'&&s.type!=='FM包月馆')continue;
      if(!mgrCities[s.mgr])mgrCities[s.mgr]=new Set();mgrCities[s.mgr].add(s.city);
      if(!cityMgrMap[s.city])cityMgrMap[s.city]=new Set();cityMgrMap[s.city].add(s.mgr);
    }
  }
  var allCities=Object.keys(cityMgrMap).sort();

  var rows=[],totalCnt=0;
  for(var name in allNames){
    if(EXCLUDED_MGRS.has(name))continue;
    if(dailyMgrFilter){var mcs=mgrCities[name]||new Set();if(!mcs.has(dailyMgrFilter))continue;}
    var v1=data1[name]||[0,0,0],v2=data2[name]||[0,0,0];
    var cr1=v1[0]>0?v1[1]/v1[0]*100:0,cr2=v2[0]>0?v2[1]/v2[0]*100:0;
    rows.push({name:name,count:v2[2],pt1:v1[0],cr1:cr1,pt2:v2[0],cr2:cr2,crDiff:cr2-cr1,ns1:v1[1],ns2:v2[1],nsDiff:v2[1]-v1[1]});
    totalCnt+=v2[2];
  }
  var sk=dailyMgrSort.key,sd=dailyMgrSort.dir;
  rows.sort(function(a,b){var va=a[sk],vb=b[sk];if(typeof va==='string')return sd*va.localeCompare(vb);return sd*(va-vb);});

  var totalPt1=0,totalPt2=0,totalNs1=0,totalNs2=0;
  for(var i=0;i<rows.length;i++){totalPt1+=rows[i].pt1;totalPt2+=rows[i].pt2;totalNs1+=rows[i].ns1;totalNs2+=rows[i].ns2;}
  var totalCr1=totalPt1>0?totalNs1/totalPt1*100:0,totalCr2=totalPt2>0?totalNs2/totalPt2*100:0;
  var totalNsDiff=totalNs2-totalNs1,totalCrDiff=totalCr2-totalCr1;
  var h='';

  // City filter
  h+='<div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center">';
  h+='<select onchange="dailyMgrFilter=this.value;renderDailyCombined()" style="padding:8px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;background:#fff;color:#334155;min-width:120px">';
  h+='<option value="">全部城市</option>';
  for(var i=0;i<allCities.length;i++){
    h+='<option value="'+allCities[i]+'"'+(dailyMgrFilter===allCities[i]?' selected':'')+'>'+allCities[i]+'</option>';
  }
  h+='</select></div>';

  // Table
  var cols=[{key:'name',label:'区域经理',w:'100px'},{key:'count',label:'门店',w:'55px'},
    {key:'pt2',label:'目标(万)',w:'95px'},{key:'cr1',label:label1+'完成率',w:'100px'},
    {key:'cr2',label:label2+'完成率',w:'100px'},{key:'crDiff',label:'完成率变化',w:'100px'},
    {key:'ns1',label:label1+'净收入',w:'100px'},{key:'ns2',label:label2+'净收入',w:'100px'},
    {key:'nsDiff',label:'净增(万)',w:'95px'}];
  h+='<div class="table-wrap" style="border-radius:12px;overflow:hidden;border:1px solid #e2e8f0"><table style="border-collapse:collapse;width:100%;table-layout:fixed">';
  // thead: column headers + total row (sticky)
  h+='<thead>';
  h+='<tr>';
  for(var i=0;i<cols.length;i++){var c=cols[i],arrow='';if(sk===c.key)arrow=sd>0?' ↑':' ↓';
    h+='<th style="padding:10px;font-size:12px;font-weight:600;color:#64748b;background:#f8fafc;border-bottom:2px solid #e2e8f0;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:'+c.w+'" onclick="toggleDailySort(\'m\',\''+c.key+'\')">'+c.label+'<span style="color:#3b82f6;margin-left:2px">'+arrow+'</span></th>';}
  h+='</tr>';
  // Total row (first row, sticky)
  var tcc=totalCrDiff>0?'#16a34a':(totalCrDiff<0?'#dc2626':'#1e40af');
  var tnc=totalNsDiff>0?'#16a34a':(totalNsDiff<0?'#dc2626':'#1e40af');
  h+='<tr style="background:#eff6ff;font-weight:700;position:sticky;top:36px;z-index:1">';
  h+='<td style="padding:10px;color:#1e40af;border-bottom:2px solid #bfdbfe">合计</td>';
  h+='<td style="padding:10px;text-align:center;color:#1e40af;border-bottom:2px solid #bfdbfe">'+totalCnt+'</td>';
  h+='<td style="padding:10px;text-align:right;color:#1e40af;border-bottom:2px solid #bfdbfe">'+totalPt2.toFixed(2)+'</td>';
  h+='<td style="padding:10px;text-align:right;color:#1e40af;border-bottom:2px solid #bfdbfe">'+totalCr1.toFixed(1)+'%</td>';
  h+='<td style="padding:10px;text-align:right;color:#1e40af;border-bottom:2px solid #bfdbfe">'+totalCr2.toFixed(1)+'%</td>';
  h+='<td style="padding:10px;text-align:right;font-weight:700;color:'+tcc+';border-bottom:2px solid #bfdbfe">'+(totalCrDiff>=0?'+':'')+totalCrDiff.toFixed(1)+'pp</td>';
  h+='<td style="padding:10px;text-align:right;color:#1e40af;border-bottom:2px solid #bfdbfe">'+totalNs1.toFixed(2)+'</td>';
  h+='<td style="padding:10px;text-align:right;color:#1e40af;border-bottom:2px solid #bfdbfe">'+totalNs2.toFixed(2)+'</td>';
  h+='<td style="padding:10px;text-align:right;font-weight:700;color:'+tnc+';border-bottom:2px solid #bfdbfe">'+(totalNsDiff>=0?'+':'')+totalNsDiff.toFixed(2)+'</td>';
  h+='</tr>';
  h+='</thead><tbody>';
  for(var i=0;i<rows.length;i++){
    var r=rows[i];var bg=i%2===0?'#fff':'#f8fafc';
    h+='<tr style="background:'+bg+'">';
    h+='<td style="padding:10px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid #f1f5f9">'+r.name+'</td>';
    h+='<td style="padding:10px;text-align:center;color:#64748b;border-bottom:1px solid #f1f5f9">'+r.count+'</td>';
    h+='<td style="padding:10px;text-align:right;color:#475569;border-bottom:1px solid #f1f5f9">'+r.pt2.toFixed(2)+'</td>';
    h+='<td style="padding:10px;text-align:right;color:#475569;border-bottom:1px solid #f1f5f9">'+r.cr1.toFixed(1)+'%</td>';
    h+='<td style="padding:10px;text-align:right;color:#475569;border-bottom:1px solid #f1f5f9">'+r.cr2.toFixed(1)+'%</td>';
    var cc=r.crDiff>0?'#16a34a':(r.crDiff<0?'#dc2626':'#64748b');
    h+='<td style="padding:10px;text-align:right;font-weight:700;color:'+cc+';border-bottom:1px solid #f1f5f9">'+(r.crDiff>=0?'+':'')+r.crDiff.toFixed(1)+'pp</td>';
    h+='<td style="padding:10px;text-align:right;color:#475569;border-bottom:1px solid #f1f5f9">'+r.ns1.toFixed(2)+'</td>';
    h+='<td style="padding:10px;text-align:right;color:#475569;border-bottom:1px solid #f1f5f9">'+r.ns2.toFixed(2)+'</td>';
    var nc=r.nsDiff>0?'#16a34a':(r.nsDiff<0?'#dc2626':'#64748b');
    h+='<td style="padding:10px;text-align:right;font-weight:700;color:'+nc+';border-bottom:1px solid #f1f5f9">'+(r.nsDiff>=0?'+':'')+r.nsDiff.toFixed(2)+'</td>';
    h+='</tr>';}
  h+='</tbody></table></div>';
  return h;
}

function summaryCard(title,value,change,positive){
  var h='<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px">';
  h+='<div style="font-size:12px;color:#94a3b8;font-weight:500;margin-bottom:6px">'+title+'</div>';
  h+='<div style="font-size:22px;font-weight:700;color:#1e293b;line-height:1.2">'+value+'</div>';
  if(change){
    var cc=positive===true?'#16a34a':(positive===false?'#dc2626':'#94a3b8');
    h+='<div style="font-size:12px;font-weight:600;color:'+cc+';margin-top:4px">'+change+'</div>';
  }
  h+='</div>';
  return h;
}
